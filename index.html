<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yılanss.io</title>
    <link rel="icon" type="image/png" href="yılanss.png">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #06112a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            -webkit-user-select: none; user-select: none; 
        }
        
        #gameCanvas { display: block; position: absolute; top:0; left:0; z-index: 1; }

        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #06112a 0%, #0a1931 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; text-align: center;
        }
        .loading-images { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .loading-images img { width: 120px; height: 120px; object-fit: contain; animation: pulseLoading 1.5s infinite; }
        @keyframes pulseLoading {
            0% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.8; }
        }
        #loading-bar-container {
            width: 80%; max-width: 400px; height: 15px; background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(0,0,0,0.5) inset;
        }
        #loading-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60);
            transition: width 0.2s ease-out; box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }
        
        #main-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: none; z-index: 100; pointer-events: none; 
        }
        .menu-element { pointer-events: auto; position: absolute; } 

        #top-left-ui { top: 20px; left: 20px; display: flex; flex-direction: column; align-items: flex-start; }
        #menu-logo-small { width: 80px; height: 80px; border-radius: 50%; box-shadow: 0 0 15px rgba(76, 175, 80, 0.5); margin-bottom: 10px; }
        #playerName {
            padding: 15px 20px; border: 2px solid rgba(255,255,255,0.2); border-radius: 30px;
            background: rgba(0,0,0,0.6); color: white; font-size: 18px; font-weight: bold; width: 220px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); outline: none; transition: 0.3s;
        }
        #playerName:focus { border-color: #4CAF50; background: rgba(0,0,0,0.8); }

        #fullscreen-btn {
            top: 20px; right: 20px; background: rgba(0,0,0,0.5); color: white;
            border: 2px solid rgba(255,255,255,0.2); padding: 10px 15px; border-radius: 20px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        #fullscreen-btn:hover { background: #4CAF50; border-color: #4CAF50; }

        #center-ui {
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; gap: 50px; justify-content: center; align-items: center; width: 100%;
        }

        .design-panel {
            background: rgba(10, 20, 40, 0.85); padding: 20px; border-radius: 20px;
            border: 2px solid rgba(65, 105, 225, 0.5); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center; width: 200px; display: flex; flex-direction: column; align-items: center;
        }
        .design-panel h3 { color: #fff; margin: 0 0 15px 0; font-size: 18px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        
        .carousel { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 15px; }
        .arrow-btn {
            background: rgba(255,255,255,0.1); border: none; color: white; font-size: 24px;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: 0.2s;
        }
        .arrow-btn:hover { background: #4CAF50; transform: scale(1.1); box-shadow: 0 0 10px #4CAF50; }

        #patternPreviewCanvas { width: 100px; height: 100px; }
        .head-preview-box {
            width: 90px; height: 90px; border-radius: 50%; border: 3px solid #fff;
            display: flex; justify-content: center; align-items: center; background: #333;
            font-weight: bold; color: white; font-size: 14px; overflow: hidden; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .head-preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .selection-name { color: #2ecc71; font-weight: bold; font-size: 16px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 15px; }

        #bottom-right-ui { bottom: 30px; right: 30px; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; }
        
        #gameModeSelect {
            background: rgba(0,0,0,0.7); color: white; border: 2px solid rgba(255,255,255,0.3);
            padding: 12px 15px; border-radius: 15px; font-weight: bold; font-size: 15px;
            outline: none; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        #gameModeSelect:hover { border-color: #f39c12; }

        .room-group { display: flex; gap: 10px; align-items: center; }
        #hostIdInput {
            padding: 12px 15px; border-radius: 10px; border: none; background: rgba(255,255,255,0.9);
            font-weight: bold; width: 140px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-join {
            background: linear-gradient(135deg, #f39c12, #d35400); color: white; border: none;
            padding: 12px 20px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.4); transition: 0.2s;
        }
        .btn-join:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(211, 84, 0, 0.6); }

        .btn-start {
            background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border: none;
            padding: 20px 50px; border-radius: 30px; font-size: 28px; font-weight: bold; cursor: pointer;
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.5); transition: 0.2s; animation: pulseStart 2s infinite;
        }
        .btn-start:hover { transform: scale(1.05); background: linear-gradient(135deg, #27ae60, #1e8449); }
        
        @keyframes pulseStart {
            0% { box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
            50% { box-shadow: 0 0 35px rgba(46, 204, 113, 0.8); }
            100% { box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
        }

        #game-ui { position: absolute; top: 10px; left: 10px; z-index: 10; display: none; background: rgba(0,0,0,0.6); color: white; padding: 10px; border-radius: 8px; font-family: monospace; min-width: 200px; pointer-events: none; }
        #game-ui button { pointer-events: auto; }
        #status { margin-bottom: 10px; }
        
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 130px; height: 130px; z-index: 10; display: none; }

        #powerup-ui {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 15; pointer-events: none;
        }
        .pu-box {
            background: rgba(0, 0, 0, 0.75); padding: 8px 15px; border-radius: 20px;
            border: 2px solid #fff; color: white; font-weight: bold; font-size: 18px;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 0 15px rgba(255,255,255,0.3);
            display: none; 
        }
        .pu-box.magnet { border-color: #3498db; box-shadow: 0 0 15px #3498db; }
        .pu-box.ghost { border-color: #ecf0f1; box-shadow: 0 0 15px #ecf0f1; }
        .pu-box.x2 { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        
        .pu-time { font-size: 20px; color: #fff; }
        .pu-time.warning { color: #e74c3c; animation: blink 0.4s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; color: white; } }

        #boost-btn {
            position: absolute; bottom: 30px; right: 30px; width: 80px; height: 80px;
            background: rgba(255, 71, 87, 0.6); color: white; border-radius: 50%;
            display: none; justify-content: center; align-items: center; text-align: center;
            font-size: 14px; font-weight: bold; border: 3px solid rgba(255,255,255,0.4);
            z-index: 20; box-shadow: 0 0 20px rgba(255, 71, 87, 0.5); transition: 0.1s;
            user-select: none; -webkit-user-select: none; cursor: pointer;
        }
        #boost-btn:active { background: rgba(255, 71, 87, 1); transform: scale(0.9); box-shadow: 0 0 30px rgba(255, 71, 87, 0.8); }

        #orientation-warning {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #e74c3c; color: white; z-index: 200;
            text-align: center; flex-direction: column; justify-content: center; align-items: center; font-size: 24px; font-weight: bold;
        }
        @media screen and (orientation: portrait) { #orientation-warning { display: flex; } }

        @media (max-width: 768px), (max-height: 600px) {
            #menu-logo-small { width: 50px; height: 50px; }
            #playerName { width: 150px; padding: 10px 15px; font-size: 14px; }
            #center-ui { flex-direction: row; gap: 15px; transform: translate(-50%, -40%); }
            .design-panel { width: 140px; padding: 10px; }
            .design-panel h3 { font-size: 12px; margin-bottom: 5px; }
            #patternPreviewCanvas { width: 70px; height: 70px; }
            .head-preview-box { width: 60px; height: 60px; }
            .selection-name { font-size: 12px; }
            .btn-start { padding: 15px 30px; font-size: 20px; }
            #hostIdInput { width: 90px; padding: 8px; font-size: 12px;}
            .btn-join { padding: 8px 12px; font-size: 12px; }
            #gameModeSelect { padding: 8px; font-size: 12px; }
            #boost-btn { bottom: 20px; right: 20px; width: 70px; height: 70px; font-size: 12px; }
            .pu-box { padding: 5px 10px; font-size: 14px; gap: 5px; }
            .pu-time { font-size: 16px; }
        }

        #death-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); color: white; z-index: 50;
            flex-direction: column; justify-content: center; align-items: center; pointer-events: auto;
        }
        #death-screen h1 { font-size: 56px; color: #ff4757; margin-bottom: 10px; text-shadow: 0 0 20px red; }
        .death-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .menu-btn-small { background: #4CAF50; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;}
        .menu-btn-small.exit { background: #e74c3c; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>
<body>

    <div id="orientation-warning"><p>Lütfen cihazınızı yan çevirin!</p></div>

    <div id="loading-screen">
        <div class="loading-images">
            <img src="yılanss.png" alt="Yılanss" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='">
            <img src="Yükleme1.png" alt="Yükleniyor" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='">
        </div>
        <h2 style="margin-bottom: 20px; font-size: 24px;">Oyun Hazırlanıyor... <span id="loading-text">0%</span></h2>
        <div id="loading-bar-container">
            <div id="loading-bar"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="main-menu">
        <div id="top-left-ui" class="menu-element">
            <img src="yılanss.png" id="menu-logo-small" alt="Logo" onerror="this.style.display='none'">
            <input type="text" id="playerName" placeholder="Oyuncu Adı" value="">
        </div>

        <button id="fullscreen-btn" class="menu-element" onclick="requestFullScreen()">🔲 Tam Ekran</button>

        <div id="center-ui" class="menu-element">
            <div class="design-panel">
                <h3>Gövde Deseni</h3>
                <div class="carousel">
                    <button class="arrow-btn" onclick="changePattern(-1)">&#10094;</button>
                    <canvas id="patternPreviewCanvas"></canvas>
                    <button class="arrow-btn" onclick="changePattern(1)">&#10095;</button>
                </div>
                <div id="pattern-name" class="selection-name">Klasik</div>
            </div>

            <div class="design-panel">
                <h3>Kafa Seçimi</h3>
                <div class="carousel">
                    <button class="arrow-btn" onclick="changeHead(-1)">&#10094;</button>
                    <div id="head-preview-box" class="head-preview-box">Düz</div>
                    <button class="arrow-btn" onclick="changeHead(1)">&#10095;</button>
                </div>
                <div id="head-name" class="selection-name">Düz Seçim</div>
            </div>
        </div>

        <div id="bottom-right-ui" class="menu-element">
            <select id="gameModeSelect">
                <option value="classic">🟢 Klasik (Güçler Haritada Çıkar)</option>
                <option value="overpowered">🔥 Güçlü Başlangıç (10s Tüm Güçlerle Başla)</option>
            </select>

            <div class="room-group">
                <input type="text" id="hostIdInput" placeholder="Oda ID Gir">
                <button class="btn-join" onclick="joinGame()">Odaya Katıl</button>
            </div>
            <button class="btn-start" onclick="startGame()">BAŞLA</button>
        </div>
    </div>

    <div id="game-ui">
        <div id="status">Bağlanıyor...</div>
        <button class="menu-btn-small exit" style="margin-top:5px; padding: 5px 10px; font-size: 14px;" onclick="returnToMenu()">Menüye Dön</button>
    </div>

    <div id="death-screen">
        <h1>ÖLDÜN!</h1>
        <div class="death-buttons">
            <button class="menu-btn-small" onclick="respawn()" style="width: 150px; font-size: 20px;">Yeniden Doğ</button>
            <button class="menu-btn-small exit" onclick="returnToMenu()" style="width: 150px; font-size: 20px;">Menüye Dön</button>
        </div>
    </div>

    <div id="joystick-zone"></div>
    <div id="boost-btn">🚀 HIZ<br><span style="font-size:10px;">(Basılı Tut)</span></div>
    
    <div id="powerup-ui">
        <div id="pu-magnet" class="pu-box magnet">🧲 <span class="pu-time"></span></div>
        <div id="pu-ghost" class="pu-box ghost">👻 <span class="pu-time"></span></div>
        <div id="pu-x2" class="pu-box x2">⭐ <span class="pu-time"></span></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth; let height = window.innerHeight;
        canvas.width = width; canvas.height = height;

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        });

        function requestFullScreen() {
            let el = document.documentElement;
            if (!document.fullscreenElement) {
                if (el.requestFullscreen) { el.requestFullscreen(); } 
                else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
            }
        }

        const bodyPatterns = {
            'gokkusagi': ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#9400D3'],
            'kaplan': ['#FF8C00', '#000000', '#FF8C00', '#FFFFFF'],
            'zebra': ['#FFFFFF', '#000000', '#FFFFFF', '#333333'],
            'ates': ['#FF4500', '#FF8C00', '#FFD700', '#FF0000'],
            'okyanus': ['#000080', '#0000FF', '#00FFFF', '#1E90FF'],
            'neon': ['#FF1493', '#00FFFF', '#FF00FF', '#00BFFF'],
            'orman': ['#228B22', '#006400', '#8B4513', '#32CD32'],
            'galaksi': ['#0B0C10', '#4B0082', '#8A2BE2', '#FFD700'],
            'seker': ['#FFB6C1', '#FFFFFF', '#87CEFA', '#FF69B4'],
            'zehir': ['#800080', '#39FF14', '#4B0082', '#00FF00'],
            'lav': ['#8B0000', '#000000', '#FF4500', '#FF0000'],
            'ari': ['#FFD700', '#000000', '#FFD700', '#000000'],
            'karpuz': ['#008000', '#FF0000', '#000000', '#FF0000'],
            'kamuflaj': ['#556B2F', '#8B4513', '#2E8B57', '#000000'],
            'buzul': ['#FFFFFF', '#E0FFFF', '#AFEEEE', '#4682B4']
        };
        const patternKeys = [null, ...Object.keys(bodyPatterns)];
        const patternNames = ["Klasik", "Gökkuşağı", "Kaplan", "Zebra", "Ateş", "Okyanus", "Neon", "Orman", "Galaksi", "Şeker", "Zehir", "Lav", "Arı", "Karpuz", "Kamuflaj", "Buzul"];
        const headKeys = [null, 'ömer', 'yusuf', 'enes'];
        const headNames = ["Düz (Resimsiz)", "Ömer", "Yusuf", "Enes"];

        let currentPatternIndex = 0; let currentHeadIndex = 0;
        let myPattern = null; let mySkin = null;

        const skinImages = {};
        const assetsToLoad = [
            { id: 'ömer', src: 'ömer.png', type: 'skin' },
            { id: 'yusuf', src: 'yusuf.png', type: 'skin' },
            { id: 'enes', src: 'enes.png', type: 'skin' },
            { id: 'logo', src: 'yılanss.png', type: 'img' },
            { id: 'loading', src: 'Yükleme1.png', type: 'img' }
        ];

        let loadedAssets = 0;
        
        window.onload = () => {
            if (assetsToLoad.length === 0) return finishLoading();
            assetsToLoad.forEach(asset => {
                let img = new Image(); img.src = asset.src;
                img.onload = img.onerror = () => {
                    loadedAssets++;
                    let percent = Math.floor((loadedAssets / assetsToLoad.length) * 100);
                    document.getElementById('loading-bar').style.width = percent + '%';
                    document.getElementById('loading-text').innerText = percent + '%';
                    if (asset.type === 'skin') skinImages[asset.id] = img;
                    if (loadedAssets === assetsToLoad.length) setTimeout(finishLoading, 600); 
                };
            });
        };

        const WORLD_SIZE = 4000;
        const SNAKE_SPEED = 3.5; 
        const MAX_BOTS = 40; 
        const MAX_FOOD = 500;    
        const FPS = 60;
        const fpsInterval = 1000 / FPS;
        let lastRenderTime = performance.now();

        let myAngle = 0; let myBoost = false; let joystickManager = null;
        let peer = null, isHost = false, connections = [], serverConn = null, myId = null, myName = "";
        
        let gameState = { snakes: {}, food: [], leaderboard: [], particles: [], powerups: [], rankings: [] };
        let currentGameMode = 'classic';
        const POWERUP_TYPES = ['magnet', 'ghost', 'x2'];
        const botNames = ["Alpha", "Gölge", "Yokedici", "Sinsi", "Kobra", "Titan", "Ninja", "Avcı", "Rüzgar", "Hızlı", "Zehir", "Gaddar", "Şampiyon", "Hayalet", "Fırtına", "Piton"];

        let inMenuMode = true; 
        let menuCamX = WORLD_SIZE / 2; let menuCamY = WORLD_SIZE / 2; let menuCamAngle = 0;

        function randomColor() {
            const colors = ['#FF4757', '#2ED573', '#1E90FF', '#FFA502', '#FF6348', '#7BED9F', '#70A1FF'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function updateMenus() {
            myPattern = patternKeys[currentPatternIndex];
            mySkin = headKeys[currentHeadIndex];
            document.getElementById('pattern-name').innerText = patternNames[currentPatternIndex];
            document.getElementById('head-name').innerText = headNames[currentHeadIndex];
            let headBox = document.getElementById('head-preview-box');
            if(mySkin && skinImages[mySkin] && skinImages[mySkin].complete) headBox.innerHTML = `<img src="${skinImages[mySkin].src}">`;
            else headBox.innerHTML = "Düz";
        }

        function changePattern(dir) {
            currentPatternIndex += dir;
            if(currentPatternIndex >= patternKeys.length) currentPatternIndex = 0;
            if(currentPatternIndex < 0) currentPatternIndex = patternKeys.length - 1;
            updateMenus();
        }

        function changeHead(dir) {
            currentHeadIndex += dir;
            if(currentHeadIndex >= headKeys.length) currentHeadIndex = 0;
            if(currentHeadIndex < 0) currentHeadIndex = headKeys.length - 1;
            updateMenus();
        }

        let previewTime = 0;
        function animatePatternPreview() {
            if(!inMenuMode) return;
            const pCanvas = document.getElementById('patternPreviewCanvas');
            pCanvas.width = 100; pCanvas.height = 100;
            const pCtx = pCanvas.getContext('2d'); pCtx.clearRect(0,0, 100, 100);
            previewTime += 0.1;
            let currentP = myPattern ? bodyPatterns[myPattern] : null;
            let segments = [];
            for(let i=0; i<12; i++) { let x = 50 + Math.sin(previewTime - i * 0.4) * 20; let y = 15 + i * 6; segments.push({x, y}); }
            for(let i=segments.length-1; i>=0; i--) {
                if(currentP) pCtx.fillStyle = currentP[Math.floor(i / 2) % currentP.length]; else pCtx.fillStyle = '#4CAF50';
                pCtx.beginPath(); pCtx.arc(segments[i].x, segments[i].y, 10 * (1 - (i / 15) * 0.4), 0, Math.PI*2); pCtx.fill();
            }
            requestAnimationFrame(animatePatternPreview);
        }

        function spawnSnake(id, name, isBot = false, skin = null, pattern = null, isMenuBot = false) {
            let startX = isMenuBot ? WORLD_SIZE/2 + (Math.random()-0.5)*1500 : Math.random() * (WORLD_SIZE - 400) + 200;
            let startY = isMenuBot ? WORLD_SIZE/2 + (Math.random()-0.5)*1500 : Math.random() * (WORLD_SIZE - 400) + 200;
            
            // DÜZELTME: Sadece bot olmayanlar (yani oyuncular) güçlü başlar.
            let initialPowerups = { magnet: 0, ghost: 0, x2: 0 };
            if (!isBot && currentGameMode === 'overpowered') {
                initialPowerups = { magnet: 10, ghost: 10, x2: 10 };
            }

            gameState.snakes[id] = {
                id: id, name: name || "İsimsiz", x: startX, y: startY, angle: Math.random() * Math.PI * 2, 
                body: [], color: randomColor(), size: 12, length: 15, isBot: isBot, 
                skin: skin, pattern: pattern, isBoosting: false, 
                activePowerups: initialPowerups
            };
        }

        function spawnFood(x, y, size, color) {
            gameState.food.push({
                x: x || Math.random() * WORLD_SIZE, y: y || Math.random() * WORLD_SIZE,
                size: size || 5, color: color || randomColor()
            });
        }

        function spawnPowerup() {
            if (gameState.powerups.length < 25) { 
                gameState.powerups.push({
                    id: Math.random().toString(36).substr(2, 9),
                    x: 100 + Math.random() * (WORLD_SIZE - 200),
                    y: 100 + Math.random() * (WORLD_SIZE - 200),
                    type: POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)],
                    size: 20
                });
            }
        }

        function finishLoading() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            updateMenus(); animatePatternPreview();
            for(let i=0; i<MAX_FOOD; i++) spawnFood();
            for(let i=0; i<30; i++) {
                let p = Math.random() > 0.2 ? patternKeys[Math.floor(Math.random() * patternKeys.length)] : null;
                spawnSnake("menuBot_" + i, botNames[Math.floor(Math.random() * botNames.length)], true, null, p, true);
            }
            requestAnimationFrame(menuBackgroundLoop);
        }

        function menuBackgroundLoop() {
            if(!inMenuMode) return;
            requestAnimationFrame(menuBackgroundLoop);
            menuCamAngle += 0.002;
            menuCamX = WORLD_SIZE/2 + Math.cos(menuCamAngle) * 800; menuCamY = WORLD_SIZE/2 + Math.sin(menuCamAngle) * 800;
            for (let id in gameState.snakes) {
                let s = gameState.snakes[id];
                if(Math.random() < 0.05) s.angle += (Math.random() - 0.5) * 0.5;
                s.body.unshift({ x: s.x, y: s.y });
                if (s.body.length > s.length * 3) s.body.pop();
                s.x += Math.cos(s.angle) * SNAKE_SPEED; s.y -= Math.sin(s.angle) * SNAKE_SPEED;
                if(s.x < 100) { s.x = 100; s.angle = 0; } if(s.x > WORLD_SIZE-100) { s.x = WORLD_SIZE-100; s.angle = Math.PI; }
                if(s.y < 100) { s.y = 100; s.angle = Math.PI/2; } if(s.y > WORLD_SIZE-100) { s.y = WORLD_SIZE-100; s.angle = -Math.PI/2; }
            }
            drawGame(menuCamX, menuCamY, false);
        }

        function initJoystick() {
            if (joystickManager) return;
            joystickManager = nipplejs.create({ zone: document.getElementById('joystick-zone'), mode: 'static', position: { left: '75px', bottom: '75px' }, color: 'white' });
            joystickManager.on('move', (evt, data) => { if (data.angle) myAngle = data.angle.radian; });
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') myBoost = true; });
        window.addEventListener('keyup', (e) => { if(e.code === 'Space') myBoost = false; });
        window.addEventListener('mousedown', (e) => { if(e.target.id !== 'joystick-zone' && e.target.className !== 'front') myBoost = true; });
        window.addEventListener('mouseup', () => { myBoost = false; });
        
        let boostBtn = document.getElementById('boost-btn');
        boostBtn.addEventListener('touchstart', (e) => { e.preventDefault(); myBoost = true; }, {passive: false});
        boostBtn.addEventListener('touchend', (e) => { e.preventDefault(); myBoost = false; });

        function getPlayerName() {
            let val = document.getElementById('playerName').value;
            return val.trim() !== "" ? val : "Oyuncu";
        }

        function showGameScreen() {
            inMenuMode = false; 
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('joystick-zone').style.display = 'block';
            document.getElementById('boost-btn').style.display = 'flex'; 
            requestFullScreen(); initJoystick(); 
        }

        function returnToMenu() { window.location.reload(); }

        function startGame() {
            myName = getPlayerName();
            currentGameMode = document.getElementById('gameModeSelect').value; 
            showGameScreen();
            
            gameState.snakes = {}; gameState.powerups = [];
            
            peer = new Peer();
            peer.on('open', (id) => {
                myId = id; isHost = true;
                document.getElementById('status').innerHTML = "Oda ID: <strong style='color:#4CAF50;'>" + id + "</strong>";
                
                spawnSnake(myId, myName, false, mySkin, myPattern, false);
                for(let i=0; i<MAX_FOOD; i++) spawnFood();
                
                for(let i=0; i<10; i++) spawnPowerup(); 
                
                for(let i=0; i<MAX_BOTS; i++) {
                    let botPattern = Math.random() > 0.3 ? patternKeys[Math.floor(Math.random() * patternKeys.length)] : null;
                    spawnSnake("bot_" + i, botNames[Math.floor(Math.random() * botNames.length)], true, null, botPattern, false); 
                }

                lastRenderTime = performance.now();
                requestAnimationFrame(hostGameLoop);
            });

            peer.on('connection', (conn) => {
                connections.push(conn);
                conn.on('data', (data) => {
                    if (data.type === 'join') spawnSnake(conn.peer, data.name, false, data.skin, data.pattern, false);
                    if (data.type === 'input' && gameState.snakes[conn.peer]) {
                        gameState.snakes[conn.peer].angle = data.angle;
                        gameState.snakes[conn.peer].isBoosting = data.boost;
                    }
                });
                conn.on('close', () => { delete gameState.snakes[conn.peer]; });
            });
        }

        function joinGame() {
            const hostId = document.getElementById('hostIdInput').value;
            myName = getPlayerName();
            if (!hostId) return alert("Lütfen arkadaşının ID'sini gir!");

            showGameScreen();
            gameState.snakes = {}; 
            
            peer = new Peer();
            peer.on('open', (id) => {
                myId = id; serverConn = peer.connect(hostId);
                serverConn.on('open', () => {
                    document.getElementById('status').innerText = "Odaya Bağlanıldı!";
                    serverConn.send({ type: 'join', name: myName, skin: mySkin, pattern: myPattern }); 
                    setInterval(() => {
                        if(document.getElementById('death-screen').style.display !== 'flex') {
                            serverConn.send({ type: 'input', angle: myAngle, boost: myBoost });
                        }
                    }, 50);
                });

                serverConn.on('data', (data) => {
                    if (data.type === 'state') {
                        gameState = data.state; checkMyDeath(); 
                        let me = gameState.snakes[myId];
                        drawGame(me ? me.x : WORLD_SIZE/2, me ? me.y : WORLD_SIZE/2, true);
                    }
                });
            });
        }

        function respawn() {
            document.getElementById('death-screen').style.display = 'none';
            if (isHost) spawnSnake(myId, myName, false, mySkin, myPattern, false);
            else serverConn.send({ type: 'join', name: myName, skin: mySkin, pattern: myPattern });
        }

        function checkMyDeath() {
            if (!isHost && myId && !gameState.snakes[myId]) {
                document.getElementById('death-screen').style.display = 'flex';
                ['magnet', 'ghost', 'x2'].forEach(t => document.getElementById('pu-'+t).style.display = 'none');
            }
        }

        function killSnake(id) {
            let snake = gameState.snakes[id];
            if(!snake) return;

            snake.body.forEach((segment, index) => {
                if (index % 3 === 0) spawnFood(segment.x, segment.y, Math.min(snake.size * 0.8, 18), snake.color);
            });

            if(!gameState.particles) gameState.particles = [];
            gameState.particles.push({ type: 'text', text: snake.name + " Patladı!", x: snake.x, y: snake.y, vx: 0, vy: -1.5, life: 2.0, color: '#ff4757' });

            for(let i=0; i<30; i++) {
                gameState.particles.push({
                    type: 'dot', x: snake.x, y: snake.y, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15,
                    life: 1.0 + Math.random(), color: snake.color, size: Math.random() * 6 + 3
                });
            }

            delete gameState.snakes[id];

            if (id === myId) {
                document.getElementById('death-screen').style.display = 'flex';
                ['magnet', 'ghost', 'x2'].forEach(t => document.getElementById('pu-'+t).style.display = 'none');
            }
            else if (snake.isBot && !inMenuMode) {
                setTimeout(() => {
                    let botId = "bot_" + Math.random().toString(36).substr(2, 5);
                    let botPattern = Math.random() > 0.3 ? patternKeys[Math.floor(Math.random() * patternKeys.length)] : null;
                    spawnSnake(botId, botNames[Math.floor(Math.random() * botNames.length)], true, null, botPattern, false);
                }, 2000);
            }
        }

        function hostGameLoop(currentTime) {
            if(inMenuMode) return;
            requestAnimationFrame(hostGameLoop);
            if (!currentTime) currentTime = performance.now();
            const deltaTime = currentTime - lastRenderTime;
            if (deltaTime < fpsInterval) return;
            lastRenderTime = currentTime - (deltaTime % fpsInterval);

            let dtSeconds = deltaTime / 1000;

            if (gameState.snakes[myId] && document.getElementById('death-screen').style.display !== 'flex') {
                gameState.snakes[myId].angle = myAngle;
                gameState.snakes[myId].isBoosting = myBoost; 
            }

            while(gameState.food.length < MAX_FOOD) spawnFood();
            
            if (gameState.powerups.length < 25 && Math.random() < 0.02) spawnPowerup();

            if(gameState.particles) {
                for (let i = gameState.particles.length - 1; i >= 0; i--) {
                    let p = gameState.particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.02; 
                    if (p.life <= 0) gameState.particles.splice(i, 1);
                }
            }

            let allSnakes = Object.values(gameState.snakes);
            allSnakes.sort((a, b) => b.length - a.length);
            
            gameState.leaderboard = allSnakes.slice(0, 10).map(s => ({ name: s.name, score: Math.floor(s.length) }));
            gameState.rankings = allSnakes.map(s => s.id);

            for (let id in gameState.snakes) {
                let snake = gameState.snakes[id];
                
                for(let type in snake.activePowerups) {
                    if (snake.activePowerups[type] > 0) {
                        snake.activePowerups[type] -= dtSeconds;
                        if (snake.activePowerups[type] <= 0) snake.activePowerups[type] = 0;
                    }
                }

                if (snake.activePowerups['magnet'] > 0) {
                    for(let f of gameState.food) {
                        if (Math.hypot(snake.x - f.x, snake.y - f.y) < 300) {
                            let ang = Math.atan2(snake.y - f.y, snake.x - f.x);
                            f.x += Math.cos(ang) * 10; f.y += Math.sin(ang) * 10;
                        }
                    }
                }

                for(let i = gameState.powerups.length - 1; i >= 0; i--) {
                    let p = gameState.powerups[i];
                    if (Math.hypot(snake.x - p.x, snake.y - p.y) < snake.size + p.size) {
                        snake.activePowerups[p.type] = 10; 
                        gameState.powerups.splice(i, 1);
                    }
                }
                
                if (snake.isBot) {
                    let isDanger = false;
                    let bestAngle = snake.angle;

                    function checkDanger(angleOffset, distance) {
                        let px = snake.x + Math.cos(snake.angle + angleOffset) * distance;
                        let py = snake.y - Math.sin(snake.angle + angleOffset) * distance;
                        if (px < 50 || px > WORLD_SIZE - 50 || py < 50 || py > WORLD_SIZE - 50) return true;
                        for (let otherId in gameState.snakes) {
                            if (otherId === id) continue;
                            let other = gameState.snakes[otherId];
                            if (other.activePowerups && other.activePowerups['ghost'] > 0) continue; 
                            if (Math.hypot(other.x - snake.x, other.y - snake.y) > 600) continue;
                            for (let i = 0; i < other.body.length; i += 3) {
                                let segment = other.body[i];
                                if (Math.hypot(px - segment.x, py - segment.y) < snake.size + other.size + 20) return true;
                            }
                        }
                        return false;
                    }

                    if (snake.activePowerups['ghost'] <= 0) {
                        let dangerStraight = checkDanger(0, 40) || checkDanger(0, 90) || checkDanger(0, 140);
                        let dangerLeft = checkDanger(0.6, 70);
                        let dangerRight = checkDanger(-0.6, 70);
                        if (dangerStraight || dangerLeft || dangerRight) {
                            isDanger = true;
                            if (dangerRight || dangerStraight) bestAngle += 0.25;
                            else if (dangerLeft || dangerStraight) bestAngle -= 0.25;
                        }
                    }

                    let closestEnemy = null; let enemyDist = 450; 
                    let bestFood = null; let foodScore = -1;
                    let bestPu = null; let puScore = -1;

                    if (!isDanger) {
                        let targetX = null; let targetY = null;
                        
                        for (let p of gameState.powerups) {
                            let dist = Math.hypot(p.x - snake.x, p.y - snake.y);
                            if (dist < 600) { let score = 5000 / (dist + 1); if (score > puScore) { puScore = score; bestPu = p; } }
                        }

                        for (let otherId in gameState.snakes) {
                            if (otherId === id) continue;
                            let other = gameState.snakes[otherId];
                            if (other.activePowerups && other.activePowerups['ghost'] > 0) continue; 
                            let dist = Math.hypot(other.x - snake.x, other.y - snake.y);
                            if (dist < enemyDist) { enemyDist = dist; closestEnemy = other; }
                        }

                        for (let f of gameState.food) {
                            let dist = Math.hypot(f.x - snake.x, f.y - snake.y);
                            if (dist < 800) {
                                let score = (f.size * f.size * f.size) / (dist + 1);
                                if (score > foodScore) { foodScore = score; bestFood = f; }
                            }
                        }

                        if (bestPu && puScore > foodScore) { targetX = bestPu.x; targetY = bestPu.y; }
                        else if (bestFood && bestFood.size > 10 && foodScore > 5) { targetX = bestFood.x; targetY = bestFood.y; } 
                        else if (closestEnemy && enemyDist < 350 && (snake.activePowerups['ghost'] <= 0)) { 
                            targetX = closestEnemy.x + Math.cos(closestEnemy.angle) * 120; targetY = closestEnemy.y - Math.sin(closestEnemy.angle) * 120; 
                        } 
                        else if (bestFood) { targetX = bestFood.x; targetY = bestFood.y; }

                        if (targetX !== null && targetY !== null) {
                            let angleToTarget = Math.atan2(snake.y - targetY, targetX - snake.x);
                            let diff = angleToTarget - snake.angle;
                            while (diff > Math.PI) diff -= Math.PI * 2; while (diff < -Math.PI) diff += Math.PI * 2;
                            bestAngle += diff * 0.1;
                        } else { if (Math.random() < 0.05) bestAngle += (Math.random() - 0.5) * 0.5; }
                    }

                    snake.angle = bestAngle;
                    if ((isDanger || (closestEnemy && enemyDist < 200)) && snake.length > 20) snake.isBoosting = (Math.random() < 0.7);
                    else snake.isBoosting = false;
                }

                snake.body.unshift({ x: snake.x, y: snake.y });
                if (snake.body.length > snake.length * 3) snake.body.pop();

                let currentSpeed = SNAKE_SPEED;
                if (snake.isBoosting && snake.length > 12) {
                    currentSpeed = SNAKE_SPEED * 2.2; 
                    snake.length -= 0.15; 
                    if(snake.size > 12) snake.size -= 0.03; 
                    if (Math.random() < 0.15) { let tail = snake.body[snake.body.length - 1]; if (tail) spawnFood(tail.x, tail.y, 4, snake.color); }
                }

                snake.x += Math.cos(snake.angle) * currentSpeed;
                snake.y -= Math.sin(snake.angle) * currentSpeed; 

                if (snake.x < 0 || snake.x > WORLD_SIZE || snake.y < 0 || snake.y > WORLD_SIZE) { killSnake(id); continue; }

                let died = false;
                if (snake.activePowerups['ghost'] <= 0) {
                    for (let otherId in gameState.snakes) {
                        if (id === otherId) continue;
                        let other = gameState.snakes[otherId];
                        if (other.activePowerups && other.activePowerups['ghost'] > 0) continue; 
                        for (let i = 0; i < other.body.length; i += 3) {
                            let segment = other.body[i];
                            if (Math.hypot(snake.x - segment.x, snake.y - segment.y) < snake.size + (other.size * 0.8)) { died = true; break; }
                        }
                        if(died) break;
                    }
                }
                if (died) { killSnake(id); continue; }

                let multiplier = (snake.activePowerups['x2'] > 0) ? 2 : 1;
                for (let i = gameState.food.length - 1; i >= 0; i--) {
                    let f = gameState.food[i];
                    if (Math.hypot(snake.x - f.x, snake.y - f.y) < snake.size + f.size) {
                        snake.length += (f.size > 10 ? 1 : 0.2) * multiplier; 
                        if(snake.size < 40) snake.size += (f.size > 10 ? 0.1 : 0.02) * multiplier; 
                        gameState.food.splice(i, 1); 
                    }
                }
            }

            const statePacket = { type: 'state', state: gameState };
            connections.forEach(conn => { if(conn.open) conn.send(statePacket); });
            
            let me = gameState.snakes[myId];
            drawGame(me ? me.x : WORLD_SIZE/2, me ? me.y : WORLD_SIZE/2, true);
        }

        function drawGame(targetX, targetY, showUI) {
            ctx.fillStyle = '#06112a'; 
            ctx.fillRect(0, 0, width, height);

            let camX = targetX - width / 2; let camY = targetY - height / 2;

            ctx.save(); ctx.translate(-camX, -camY);

            ctx.strokeStyle = '#ff4757'; ctx.lineWidth = 10; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

            ctx.strokeStyle = 'rgba(65, 105, 225, 0.15)'; ctx.lineWidth = 2; ctx.beginPath();
            let gridSize = 60; 
            let startX = Math.floor(camX / gridSize) * gridSize; let startY = Math.floor(camY / gridSize) * gridSize;
            for(let i = startX; i < camX + width; i+=gridSize) { ctx.moveTo(i, camY); ctx.lineTo(i, camY+height); }
            for(let i = startY; i < camY + height; i+=gridSize) { ctx.moveTo(camX, i); ctx.lineTo(camX+width, i); }
            ctx.stroke();

            ctx.fillStyle = 'rgba(100, 149, 237, 0.3)';
            for(let i = startX; i < camX + width; i+=gridSize) {
                for(let j = startY; j < camY + height; j+=gridSize) { ctx.beginPath(); ctx.arc(i, j, 2, 0, Math.PI*2); ctx.fill(); }
            }

            gameState.food.forEach(f => {
                if(f.x > camX - 20 && f.x < camX + width + 20 && f.y > camY - 20 && f.y < camY + height + 20) {
                    ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2); ctx.fill();
                }
            });

            if (gameState.powerups) {
                gameState.powerups.forEach(p => {
                    if(p.x > camX - 30 && p.x < camX + width + 30 && p.y > camY - 30 && p.y < camY + height + 30) {
                        ctx.save(); ctx.translate(p.x, p.y);
                        
                        ctx.shadowColor = p.type === 'magnet' ? '#3498db' : (p.type === 'ghost' ? '#ecf0f1' : '#f1c40f');
                        ctx.shadowBlur = 15;
                        
                        ctx.beginPath(); ctx.arc(0, 0, p.size, 0, Math.PI*2);
                        if(p.type === 'magnet') ctx.fillStyle = 'rgba(52, 152, 219, 0.8)';
                        else if(p.type === 'ghost') ctx.fillStyle = 'rgba(236, 240, 241, 0.8)';
                        else if(p.type === 'x2') ctx.fillStyle = 'rgba(241, 196, 15, 0.8)';
                        ctx.fill();
                        
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = '18px Arial';
                        if(p.type === 'magnet') ctx.fillText('🧲', 0, 1);
                        else if(p.type === 'ghost') ctx.fillText('👻', 0, 1);
                        else if(p.type === 'x2') ctx.fillText('2X', 0, 1);
                        
                        ctx.restore();
                    }
                });
            }

            if(gameState.particles) {
                gameState.particles.forEach(p => {
                    ctx.globalAlpha = Math.max(0, p.life);
                    if (p.type === 'text') {
                        ctx.fillStyle = p.color; ctx.font = "bold 26px Arial"; ctx.textAlign = "center";
                        ctx.shadowColor = "black"; ctx.shadowBlur = 5; ctx.fillText(p.text, p.x, p.y); ctx.shadowBlur = 0;
                    } else {
                        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.globalAlpha = 1.0;
                });
            }

            for (let id in gameState.snakes) {
                let snake = gameState.snakes[id];
                let currentP = (snake.pattern && bodyPatterns[snake.pattern]) ? bodyPatterns[snake.pattern] : null;

                if (snake.activePowerups && snake.activePowerups['ghost'] > 0) ctx.globalAlpha = 0.4;

                for (let i = 0; i < snake.body.length; i+=2) { 
                    let segment = snake.body[i]; 
                    if(currentP) { ctx.fillStyle = currentP[Math.floor(i / 2) % currentP.length]; } 
                    else { ctx.fillStyle = snake.color; }

                    ctx.beginPath();
                    let radius = snake.size * (1 - (i / snake.body.length) * 0.4);
                    if (snake.isBoosting && i > 0) radius *= 0.8; 
                    ctx.arc(segment.x, segment.y, radius, 0, Math.PI * 2); ctx.fill();
                }

                let isHeadDrawn = false;
                if (snake.skin && skinImages[snake.skin] && skinImages[snake.skin].complete) {
                    let img = skinImages[snake.skin];
                    if (img.naturalWidth > 0) { 
                        ctx.save(); ctx.translate(snake.x, snake.y); ctx.rotate(Math.PI / 2 - snake.angle); 
                        let r = snake.size * 1.5; ctx.drawImage(img, -r, -r, r * 2, r * 2); ctx.restore(); isHeadDrawn = true;
                    }
                }
                
                if (!isHeadDrawn) {
                    ctx.fillStyle = currentP ? currentP[0] : snake.color;
                    ctx.beginPath(); ctx.arc(snake.x, snake.y, snake.size, 0, Math.PI * 2); ctx.fill();
                    
                    ctx.fillStyle = "white";
                    let ex = Math.cos(snake.angle + Math.PI/4) * (snake.size * 0.5); let ey = -Math.sin(snake.angle + Math.PI/4) * (snake.size * 0.5);
                    ctx.beginPath(); ctx.arc(snake.x + ex, snake.y + ey, snake.size * 0.3, 0, Math.PI * 2); ctx.fill();
                    let ex2 = Math.cos(snake.angle - Math.PI/4) * (snake.size * 0.5); let ey2 = -Math.sin(snake.angle - Math.PI/4) * (snake.size * 0.5);
                    ctx.beginPath(); ctx.arc(snake.x + ex2, snake.y + ey2, snake.size * 0.3, 0, Math.PI * 2); ctx.fill();
                    
                    ctx.fillStyle = "black";
                    ctx.beginPath(); ctx.arc(snake.x + ex, snake.y + ey, snake.size * 0.15, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(snake.x + ex2, snake.y + ey2, snake.size * 0.15, 0, Math.PI * 2); ctx.fill();
                }
                
                if (snake.activePowerups) {
                    let activeIcons = [];
                    if (snake.activePowerups['magnet'] > 0) activeIcons.push('🧲');
                    if (snake.activePowerups['ghost'] > 0) activeIcons.push('👻');
                    if (snake.activePowerups['x2'] > 0) activeIcons.push('⭐');
                    
                    if (activeIcons.length > 0) {
                        ctx.fillStyle = "white"; ctx.font = "16px Arial"; ctx.textAlign = "center";
                        ctx.fillText(activeIcons.join(' '), snake.x, snake.y - snake.size - 25);
                    }
                }

                ctx.globalAlpha = 1.0; 

                if(showUI) {
                    ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
                    let displayName = id === myId ? "Sen (" + snake.name + ")" : snake.name;
                    ctx.fillText(displayName, snake.x, snake.y - snake.size - 10);
                }
            }
            ctx.restore();

            if (showUI) {
                let me = gameState.snakes[myId];
                if (me && me.activePowerups) {
                    ['magnet', 'ghost', 'x2'].forEach(type => {
                        let el = document.getElementById('pu-' + type);
                        let timeSpan = el.querySelector('.pu-time');
                        let timeLeft = me.activePowerups[type];
                        
                        if (timeLeft > 0) {
                            el.style.display = 'flex';
                            let ceilTime = Math.ceil(timeLeft);
                            timeSpan.innerText = ceilTime + 's';
                            if (ceilTime <= 3) timeSpan.classList.add('warning');
                            else timeSpan.classList.remove('warning');
                        } else {
                            el.style.display = 'none';
                        }
                    });
                }

                if (gameState.leaderboard && gameState.leaderboard.length > 0) {
                    let myRank = gameState.rankings ? gameState.rankings.indexOf(myId) + 1 : 0;
                    let lbCount = gameState.leaderboard.length;
                    
                    let boxHeight = 40 + (lbCount * 22);
                    if (myRank > 10) boxHeight += 45; 

                    let lbX = width - 180; let lbY = 20;
                    ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.roundRect(lbX, lbY, 160, boxHeight, 10); ctx.fill();
                    ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
                    ctx.fillText("Sıralama", lbX + 80, lbY + 25);
                    ctx.textAlign = "left"; ctx.font = "14px Arial";
                    
                    gameState.leaderboard.forEach((player, index) => {
                        let yPos = lbY + 50 + (index * 22);
                        let color = index === 0 ? "#FFD700" : (index === 1 ? "#C0C0C0" : (index === 2 ? "#CD7F32" : "white"));
                        ctx.fillStyle = color;
                        let dName = player.name.length > 10 ? player.name.substring(0,8) + '..' : player.name;
                        ctx.fillText(`${index + 1}. ${dName}`, lbX + 10, yPos);
                        ctx.fillText(player.score, lbX + 120, yPos);
                    });

                    if (myRank > 10) {
                        let yPos = lbY + 50 + (lbCount * 22);
                        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                        ctx.fillText("..........", lbX + 50, yPos - 5); 
                        
                        ctx.fillStyle = "#2ecc71"; 
                        let myScore = gameState.snakes[myId] ? Math.floor(gameState.snakes[myId].length) : 0;
                        ctx.fillText(`${myRank}. Sen`, lbX + 10, yPos + 15);
                        ctx.fillText(myScore, lbX + 120, yPos + 15);
                    }
                }
            }
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
                this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + r, y, r); this.closePath(); return this;
            }
        }
    </script>
