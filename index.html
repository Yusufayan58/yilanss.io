<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yılanss.io</title>
    <link rel="icon" type="image/png" href="yılanss.png">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #111; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            -webkit-user-select: none; user-select: none; 
        }
        
        #gameCanvas { display: block; }

        /* --- YÜKLEME EKRANI (LOADING) --- */
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; text-align: center;
        }
        .loading-images {
            display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px;
        }
        .loading-images img {
            width: 120px; height: 120px; object-fit: contain;
            animation: pulseLoading 1.5s infinite;
        }
        @keyframes pulseLoading {
            0% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.8; }
        }
        #loading-bar-container {
            width: 80%; max-width: 400px; height: 15px; background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(0,0,0,0.5) inset;
        }
        #loading-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60);
            transition: width 0.2s ease-out; box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }
        
        /* --- YENİ ANA MENÜ --- */
        #main-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1e1e1e 0%, #000000 100%);
            display: none; 
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
        }
        
        #menu-logo {
            width: 160px; height: 160px; object-fit: contain; margin-bottom: 10px;
            border-radius: 50%; box-shadow: 0 0 30px rgba(76, 175, 80, 0.4);
            animation: pulse 2s infinite; flex-shrink: 0;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 20px rgba(76, 175, 80, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px rgba(76, 175, 80, 0.6); }
            100% { transform: scale(0.95); box-shadow: 0 0 20px rgba(76, 175, 80, 0.2); }
        }

        #main-menu h1 {
            font-size: 56px; color: #4CAF50; margin-bottom: 10px; margin-top: 0;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.5); letter-spacing: 2px;
            flex-shrink: 0;
        }

        .menu-box {
            background: rgba(255, 255, 255, 0.1); padding: 20px 30px;
            border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px); 
            width: 90%; max-width: 340px; 
            max-height: 55vh; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
            box-sizing: border-box;
        }

        .menu-box::-webkit-scrollbar { width: 6px; }
        .menu-box::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .menu-box::-webkit-scrollbar-thumb { background: #4CAF50; border-radius: 10px; }

        .menu-btn {
            background: #4CAF50; color: white; border: none; padding: 12px 20px;
            margin-top: 10px; width: 100%; border-radius: 8px; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: 0.2s; flex-shrink: 0;
        }
        .menu-btn:hover { background: #45a049; transform: scale(1.02); }
        .menu-btn.multi { background: #2196F3; }
        .menu-btn.multi:hover { background: #1e87db; }
        .menu-btn.skins { background: #9b59b6; }
        .menu-btn.skins:hover { background: #8e44ad; }
        .menu-btn.exit { background: #e74c3c; }
        .menu-btn.exit:hover { background: #c0392b; }
        .menu-btn.fullscreen { background: #34495e; margin-top: 5px; padding: 8px; font-size: 15px; }

        input {
            width: 100%; padding: 12px; margin-top: 10px; border: none;
            border-radius: 8px; font-size: 16px; box-sizing: border-box;
            background: rgba(255,255,255,0.9); text-align: center; font-weight: bold;
        }

        #skins-section { display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        
        .skin-option {
            width: 45px; height: 45px; border-radius: 50%; border: 3px solid transparent;
            cursor: pointer; object-fit: cover; background: #fff; transition: 0.2s;
            display: flex; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .skin-option:hover { transform: scale(1.1); }
        .skin-option.selected { border-color: #4CAF50 !important; box-shadow: 0 0 15px #4CAF50; transform: scale(1.1); }
        
        .section-title { color:white; margin:0 0 8px 0; font-size:14px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        #multiplayer-section { display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        
        #game-ui {
            position: absolute; top: 10px; left: 10px; z-index: 10; display: none;
            background: rgba(0,0,0,0.6); color: white; padding: 10px; border-radius: 8px; font-family: monospace;
            min-width: 200px; pointer-events: none; 
        }
        #game-ui button { pointer-events: auto; }
        #status { margin-bottom: 10px; }
        
        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px; z-index: 10; display: none; }

        #orientation-warning {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #e74c3c; color: white; z-index: 200;
            text-align: center; flex-direction: column; justify-content: center; align-items: center; font-size: 24px; font-weight: bold;
        }
        @media screen and (orientation: portrait) { #orientation-warning { display: flex; } }

        /* MOBİL UYUM */
        @media (max-width: 600px), (max-height: 600px) {
            #menu-logo { width: 100px; height: 100px; }
            #main-menu h1 { font-size: 32px; }
            .menu-box { padding: 15px; max-height: 50vh; }
            .menu-btn { padding: 10px; font-size: 15px; }
            .skin-option { width: 40px; height: 40px; font-size: 10px; }
            #joystick-zone { bottom: 10px; left: 10px; width: 120px; height: 120px; }
        }

        #death-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); color: white; z-index: 50;
            flex-direction: column; justify-content: center; align-items: center;
        }
        #death-screen h1 { font-size: 56px; color: #ff4757; margin-bottom: 10px; text-shadow: 0 0 20px red; }
        .death-buttons { display: flex; gap: 10px; margin-top: 15px; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>
<body>

    <div id="orientation-warning"><p>Lütfen cihazınızı yan çevirin!</p></div>

    <div id="loading-screen">
        <div class="loading-images">
            <img src="yılanss.png" alt="Yılanss" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='">
            <img src="Yükleme1.png" alt="Yükleniyor" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='">
        </div>
        <h2 style="margin-bottom: 20px; font-size: 24px;">Oyun Hazırlanıyor... <span id="loading-text">0%</span></h2>
        <div id="loading-bar-container">
            <div id="loading-bar"></div>
        </div>
    </div>

    <div id="main-menu">
        <img src="yılanss.png" alt="Yılanss.io Logo" id="menu-logo" onerror="this.style.display='none'">
        <h1>Yılanss.io</h1>
        <div class="menu-box">
            <button class="menu-btn fullscreen" onclick="requestFullScreen()">🔲 Tam Ekran Yap (Genişlet)</button>
            <input type="text" id="playerName" placeholder="Oyuncu Adı" value="">
            
            <button class="menu-btn" onclick="startGame()">BAŞLA</button>
            <button class="menu-btn skins" onclick="toggleSkins()">Görünüm ve Desenler</button>
            <button class="menu-btn multi" onclick="toggleMultiplayer()">Çoklu Oyunculu<br><span style="font-size:12px; font-weight:normal;">(Arkadaşlarla oynamak için)</span></button>
            
            <div id="skins-section">
                <p class="section-title">🐍 Kafa Seçimi:</p>
                <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom: 15px;">
                    <div class="skin-option head-option selected" onclick="selectSkin(null, this)" title="Klasik">Düz</div>
                    <img src="ömer.png" class="skin-option head-option" onclick="selectSkin('ömer', this)" alt="Ömer" title="Ömer" onerror="this.style.display='none'">
                    <img src="yusuf.png" class="skin-option head-option" onclick="selectSkin('yusuf', this)" alt="Yusuf" title="Yusuf" onerror="this.style.display='none'">
                    <img src="enes.png" class="skin-option head-option" onclick="selectSkin('enes', this)" alt="Enes" title="Enes" onerror="this.style.display='none'">
                </div>

                <p class="section-title">🎨 Gövde Deseni Seç:</p>
                <div style="display:flex; justify-content:center; gap:8px; flex-wrap:wrap;">
                    <div class="skin-option pattern-option selected" onclick="selectPattern(null, this)" style="background:#4CAF50;" title="Tek Renk">Klasik</div>
                    <div class="skin-option pattern-option" onclick="selectPattern('gokkusagi', this)" style="background:linear-gradient(to right, red, yellow, green, blue, purple);" title="Gökkuşağı"></div>
                    <div class="skin-option pattern-option" onclick="selectPattern('kaplan', this)" style="background:repeating-linear-gradient(45deg, #FF8C00, #FF8C00 5px, #000 5px, #000 10px);" title="Kaplan"></div>
                    <div class="skin-option pattern-option" onclick="selectPattern('zebra', this)" style="background:repeating-linear-gradient(90deg, #FFF, #FFF 5px, #000 5px, #000 10px);" title="Zebra"></div>
                    <div class="skin-option pattern-option" onclick="selectPattern('ates', this)" style="background:linear-gradient(to bottom, #FF4500, #FFD700);" title="Ateş"></div>
                    <div class="skin-option pattern-option" onclick="selectPattern('okyanus', this)" style="background:linear-gradient(to right, navy, cyan);" title="Okyanus"></div>
                </div>
            </div>

            <div id="multiplayer-section">
                <input type="text" id="hostIdInput" placeholder="Arkadaşının ID'sini Gir">
                <button class="menu-btn" style="background:#f39c12;" onclick="joinGame()">Odaya Katıl</button>
            </div>
        </div>
    </div>

    <div id="game-ui">
        <div id="status">Bağlanıyor...</div>
        <button class="menu-btn exit" style="margin-top:5px; padding: 5px 10px; font-size: 14px;" onclick="returnToMenu()">Menüye Dön</button>
    </div>

    <div id="death-screen">
        <h1>ÖLDÜN!</h1>
        <div class="death-buttons">
            <button class="menu-btn" onclick="respawn()" style="width: 150px; font-size: 20px;">Yeniden Doğ</button>
            <button class="menu-btn exit" onclick="returnToMenu()" style="width: 150px; font-size: 20px;">Menüye Dön</button>
        </div>
    </div>

    <div id="joystick-zone"></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width; canvas.height = height;

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        });

        function requestFullScreen() {
            let el = document.documentElement;
            if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                if (el.requestFullscreen) { el.requestFullscreen(); } 
                else if (el.msRequestFullscreen) { el.msRequestFullscreen(); } 
                else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); } 
                else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
            }
        }

        // --- OPTİMİZE EDİLMİŞ ÖN YÜKLEME (PRELOAD) SİSTEMİ ---
        const skinImages = {};
        const assetsToLoad = [
            { id: 'ömer', src: 'ömer.png', type: 'skin' },
            { id: 'yusuf', src: 'yusuf.png', type: 'skin' },
            { id: 'enes', src: 'enes.png', type: 'skin' },
            { id: 'logo', src: 'yılanss.png', type: 'img' },
            { id: 'loading', src: 'Yükleme1.png', type: 'img' }
        ];

        let loadedAssets = 0;
        
        window.onload = () => {
            if (assetsToLoad.length === 0) return finishLoading();
            
            assetsToLoad.forEach(asset => {
                let img = new Image();
                img.src = asset.src;
                
                img.onload = img.onerror = () => {
                    loadedAssets++;
                    let percent = Math.floor((loadedAssets / assetsToLoad.length) * 100);
                    document.getElementById('loading-bar').style.width = percent + '%';
                    document.getElementById('loading-text').innerText = percent + '%';
                    
                    if (asset.type === 'skin') skinImages[asset.id] = img;

                    if (loadedAssets === assetsToLoad.length) {
                        setTimeout(finishLoading, 600); 
                    }
                };
            });
        };

        function finishLoading() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }

        // --- OYUN AYARLARI ---
        const WORLD_SIZE = 4000;
        const SNAKE_SPEED = 3.5; 
        const MAX_BOTS = 35; 
        const MAX_FOOD = 400;    

        const FPS = 60;
        const fpsInterval = 1000 / FPS;
        let lastRenderTime = performance.now();

        // --- DESENLER (YENİ) ---
        const bodyPatterns = {
            'gokkusagi': ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#4B0082', '#9400D3'],
            'kaplan': ['#FF8C00', '#000000', '#FF8C00', '#FFFFFF'],
            'zebra': ['#FFFFFF', '#000000', '#FFFFFF', '#333333'],
            'ates': ['#FF4500', '#FF8C00', '#FFD700', '#FF0000'],
            'okyanus': ['#000080', '#0000FF', '#00FFFF', '#1E90FF']
        };
        const patternKeys = Object.keys(bodyPatterns);

        // --- JOYSTICK ---
        let myAngle = 0; 
        let joystickManager = null;

        function initJoystick() {
            if (joystickManager) return;
            joystickManager = nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static', position: { left: '75px', bottom: '75px' }, color: 'white'
            });
            joystickManager.on('move', (evt, data) => { 
                if (data.angle) myAngle = data.angle.radian; 
            });
        }

        // --- DEĞİŞKENLER ---
        let peer = null;
        let isHost = false;
        let connections = []; 
        let serverConn = null; 
        let myId = null;
        let myName = "";
        let mySkin = null;
        let myPattern = null; // Yeni değişken

        let gameState = { snakes: {}, food: [], leaderboard: [] };
        
        const botNames = ["Alpha", "Gölge", "Yokedici", "Sinsi", "Kobra", "Titan", "Ninja", "Avcı", "Rüzgar", "Hızlı", "Zehir", "Gaddar", "Şampiyon", "Hayalet", "Fırtına", "Piton", "Ejder", "Kral", "Efsane", "Viper", "Anaconda", "Mamba", "Katil", "Usta", "Patron", "Belalı", "Korkusuz", "Gece", "Karabasan"];

        function randomColor() {
            const colors = ['#FF4757', '#2ED573', '#1E90FF', '#FFA502', '#FF6348', '#7BED9F', '#70A1FF'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function spawnFood(x, y, size, color) {
            gameState.food.push({
                x: x || Math.random() * WORLD_SIZE, y: y || Math.random() * WORLD_SIZE,
                size: size || 5, color: color || randomColor()
            });
        }

        // spawnSnake fonksiyonuna pattern eklendi
        function spawnSnake(id, name, isBot = false, skin = null, pattern = null) {
            gameState.snakes[id] = {
                id: id, name: name || "İsimsiz",
                x: Math.random() * (WORLD_SIZE - 400) + 200,
                y: Math.random() * (WORLD_SIZE - 400) + 200,
                angle: Math.random() * Math.PI * 2,
                body: [], color: randomColor(), size: 12, length: 10, isBot: isBot,
                skin: skin,
                pattern: pattern
            };
        }

        // --- MENÜ KONTROLLERİ ---
        function toggleMultiplayer() {
            let sec = document.getElementById('multiplayer-section');
            sec.style.display = sec.style.display === 'block' ? 'none' : 'block';
            document.getElementById('skins-section').style.display = 'none';
        }

        function toggleSkins() {
            let sec = document.getElementById('skins-section');
            sec.style.display = sec.style.display === 'block' ? 'none' : 'block';
            document.getElementById('multiplayer-section').style.display = 'none';
        }

        function selectSkin(skinName, element) {
            mySkin = skinName;
            document.querySelectorAll('.head-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }

        function selectPattern(patternName, element) {
            myPattern = patternName;
            document.querySelectorAll('.pattern-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        }

        function getPlayerName() {
            let val = document.getElementById('playerName').value;
            return val.trim() !== "" ? val : "Oyuncu";
        }

        function showGameScreen() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('joystick-zone').style.display = 'block';
            
            requestFullScreen();
            initJoystick(); 
        }

        function returnToMenu() {
            window.location.reload();
        }

        // --- MULTIPLAYER (PEERJS) ---
        function startGame() {
            myName = getPlayerName();
            showGameScreen();
            
            peer = new Peer();
            peer.on('open', (id) => {
                myId = id;
                isHost = true;
                document.getElementById('status').innerHTML = "Oda ID'n: <strong style='color:#4CAF50;'>" + id + "</strong>";
                
                spawnSnake(myId, myName, false, mySkin, myPattern);
                for(let i=0; i<MAX_FOOD; i++) spawnFood();
                
                // Botlara %70 ihtimalle rastgele desen ver
                for(let i=0; i<MAX_BOTS; i++) {
                    let botPattern = Math.random() > 0.3 ? patternKeys[Math.floor(Math.random() * patternKeys.length)] : null;
                    spawnSnake("bot_" + i, botNames[Math.floor(Math.random() * botNames.length)], true, null, botPattern); 
                }

                lastRenderTime = performance.now();
                requestAnimationFrame(hostGameLoop);
            });

            peer.on('connection', (conn) => {
                connections.push(conn);
                conn.on('data', (data) => {
                    // Bağlanan kişinin desenini de al
                    if (data.type === 'join') spawnSnake(conn.peer, data.name, false, data.skin, data.pattern);
                    if (data.type === 'input' && gameState.snakes[conn.peer]) gameState.snakes[conn.peer].angle = data.angle;
                });
                conn.on('close', () => { delete gameState.snakes[conn.peer]; });
            });
        }

        function joinGame() {
            const hostId = document.getElementById('hostIdInput').value;
            myName = getPlayerName();
            if (!hostId) return alert("Lütfen arkadaşının ID'sini gir!");

            showGameScreen();
            peer = new Peer();
            peer.on('open', (id) => {
                myId = id;
                serverConn = peer.connect(hostId);
                
                serverConn.on('open', () => {
                    document.getElementById('status').innerText = "Odaya Bağlanıldı!";
                    serverConn.send({ type: 'join', name: myName, skin: mySkin, pattern: myPattern }); 

                    setInterval(() => {
                        if(document.getElementById('death-screen').style.display !== 'flex') {
                            serverConn.send({ type: 'input', angle: myAngle });
                        }
                    }, 50);
                });

                serverConn.on('data', (data) => {
                    if (data.type === 'state') {
                        gameState = data.state;
                        checkMyDeath();
                        drawGame();
                    }
                });
            });
        }

        function respawn() {
            document.getElementById('death-screen').style.display = 'none';
            if (isHost) spawnSnake(myId, myName, false, mySkin, myPattern);
            else serverConn.send({ type: 'join', name: myName, skin: mySkin, pattern: myPattern });
        }

        function checkMyDeath() {
            if (!isHost && myId && !gameState.snakes[myId]) {
                document.getElementById('death-screen').style.display = 'flex';
            }
        }

        // --- OYUN FİZİĞİ & RADARLI YAPAY ZEKA ---
        function killSnake(id) {
            let snake = gameState.snakes[id];
            if(!snake) return;

            snake.body.forEach((segment, index) => {
                if (index % 3 === 0) spawnFood(segment.x, segment.y, Math.min(snake.size * 0.8, 18), snake.color);
            });

            delete gameState.snakes[id];

            if (id === myId) document.getElementById('death-screen').style.display = 'flex';
            else if (snake.isBot) {
                setTimeout(() => {
                    let botId = "bot_" + Math.random().toString(36).substr(2, 5);
                    let botPattern = Math.random() > 0.3 ? patternKeys[Math.floor(Math.random() * patternKeys.length)] : null;
                    spawnSnake(botId, botNames[Math.floor(Math.random() * botNames.length)], true, null, botPattern);
                }, 2000);
            }
        }

        function hostGameLoop(currentTime) {
            requestAnimationFrame(hostGameLoop);
            if (!currentTime) currentTime = performance.now();
            const deltaTime = currentTime - lastRenderTime;
            if (deltaTime < fpsInterval) return;
            lastRenderTime = currentTime - (deltaTime % fpsInterval);

            if (gameState.snakes[myId] && document.getElementById('death-screen').style.display !== 'flex') {
                gameState.snakes[myId].angle = myAngle;
            }

            while(gameState.food.length < MAX_FOOD) spawnFood();

            let allSnakes = Object.values(gameState.snakes);
            allSnakes.sort((a, b) => b.length - a.length);
            gameState.leaderboard = allSnakes.slice(0, 5).map(s => ({ name: s.name, score: s.length }));

            for (let id in gameState.snakes) {
                let snake = gameState.snakes[id];
                
                if (snake.isBot) {
                    let isDanger = false;
                    let bestAngle = snake.angle;

                    function checkDanger(angleOffset, distance) {
                        let px = snake.x + Math.cos(snake.angle + angleOffset) * distance;
                        let py = snake.y - Math.sin(snake.angle + angleOffset) * distance;
                        
                        if (px < 50 || px > WORLD_SIZE - 50 || py < 50 || py > WORLD_SIZE - 50) return true;
                        
                        for (let otherId in gameState.snakes) {
                            if (otherId === id) continue;
                            let other = gameState.snakes[otherId];
                            
                            if (Math.hypot(other.x - snake.x, other.y - snake.y) > 600) continue;

                            for (let i = 0; i < other.body.length; i += 3) {
                                let segment = other.body[i];
                                if (Math.hypot(px - segment.x, py - segment.y) < snake.size + other.size + 20) {
                                    return true;
                                }
                            }
                        }
                        return false;
                    }

                    let dangerStraight = checkDanger(0, 40) || checkDanger(0, 90) || checkDanger(0, 140);
                    let dangerLeft = checkDanger(0.6, 70);
                    let dangerRight = checkDanger(-0.6, 70);
                    let dangerHardLeft = checkDanger(1.2, 50);
                    let dangerHardRight = checkDanger(-1.2, 50);

                    if (dangerStraight || dangerLeft || dangerRight) {
                        isDanger = true;
                        if (!dangerHardLeft && (dangerRight || dangerStraight)) bestAngle += 0.2;
                        else if (!dangerHardRight && (dangerLeft || dangerStraight)) bestAngle -= 0.2;
                        else if (!dangerHardLeft) bestAngle += 0.25;
                        else if (!dangerHardRight) bestAngle -= 0.25;
                        else bestAngle += 0.3; 
                    }

                    if (!isDanger) {
                        let targetX = null;
                        let targetY = null;
                        let closestEnemy = null;
                        let enemyDist = 450; 

                        for (let otherId in gameState.snakes) {
                            if (otherId === id) continue;
                            let other = gameState.snakes[otherId];
                            let dist = Math.hypot(other.x - snake.x, other.y - snake.y);
                            if (dist < enemyDist) {
                                enemyDist = dist;
                                closestEnemy = other;
                            }
                        }

                        let bestFood = null;
                        let foodScore = -1;
                        for (let f of gameState.food) {
                            let dist = Math.hypot(f.x - snake.x, f.y - snake.y);
                            if (dist < 800) {
                                let score = (f.size * f.size * f.size) / (dist + 1);
                                if (score > foodScore) {
                                    foodScore = score;
                                    bestFood = f;
                                }
                            }
                        }

                        if (bestFood && bestFood.size > 10 && foodScore > 5) {
                            targetX = bestFood.x;
                            targetY = bestFood.y;
                        } 
                        else if (closestEnemy && enemyDist < 350) {
                            targetX = closestEnemy.x + Math.cos(closestEnemy.angle) * 120;
                            targetY = closestEnemy.y - Math.sin(closestEnemy.angle) * 120;
                        } 
                        else if (bestFood) {
                            targetX = bestFood.x;
                            targetY = bestFood.y;
                        }

                        if (targetX !== null && targetY !== null) {
                            let angleToTarget = Math.atan2(snake.y - targetY, targetX - snake.x);
                            let diff = angleToTarget - snake.angle;
                            while (diff > Math.PI) diff -= Math.PI * 2;
                            while (diff < -Math.PI) diff += Math.PI * 2;
                            bestAngle += diff * 0.1;
                        } else {
                            if (Math.random() < 0.05) bestAngle += (Math.random() - 0.5) * 0.5;
                        }
                    }

                    snake.angle = bestAngle;
                }

                snake.body.unshift({ x: snake.x, y: snake.y });
                if (snake.body.length > snake.length * 3) snake.body.pop();

                snake.x += Math.cos(snake.angle) * SNAKE_SPEED;
                snake.y -= Math.sin(snake.angle) * SNAKE_SPEED; 

                if (snake.x < 0 || snake.x > WORLD_SIZE || snake.y < 0 || snake.y > WORLD_SIZE) {
                    killSnake(id); continue;
                }

                let died = false;
                for (let otherId in gameState.snakes) {
                    if (id === otherId) continue;
                    let other = gameState.snakes[otherId];
                    for (let i = 0; i < other.body.length; i += 3) {
                        let segment = other.body[i];
                        if (Math.hypot(snake.x - segment.x, snake.y - segment.y) < snake.size + (other.size * 0.8)) {
                            died = true; break;
                        }
                    }
                    if(died) break;
                }
                if (died) { killSnake(id); continue; }

                for (let i = gameState.food.length - 1; i >= 0; i--) {
                    let f = gameState.food[i];
                    if (Math.hypot(snake.x - f.x, snake.y - f.y) < snake.size + f.size) {
                        snake.length += (f.size > 10 ? 5 : 1); 
                        if(snake.size < 40) snake.size += (f.size > 10 ? 0.5 : 0.1); 
                        gameState.food.splice(i, 1); 
                    }
                }
            }

            const statePacket = { type: 'state', state: gameState };
            connections.forEach(conn => { if(conn.open) conn.send(statePacket); });
            drawGame();
        }

        // --- ÇİZİM FONKSİYONU VE DESENLER ---
        function drawGame() {
            ctx.fillStyle = '#111'; ctx.fillRect(0, 0, width, height);

            let me = gameState.snakes[myId];
            let camX = me ? me.x - width / 2 : WORLD_SIZE / 2 - width / 2;
            let camY = me ? me.y - height / 2 : WORLD_SIZE / 2 - height / 2;

            ctx.save(); ctx.translate(-camX, -camY);

            ctx.strokeStyle = '#ff4757'; ctx.lineWidth = 10;
            ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)'; ctx.lineWidth = 1;
            ctx.beginPath();
            let startX = Math.floor(camX / 100) * 100; let startY = Math.floor(camY / 100) * 100;
            for(let i = startX; i < camX + width; i+=100) { ctx.moveTo(i, camY); ctx.lineTo(i, camY+height); }
            for(let i = startY; i < camY + height; i+=100) { ctx.moveTo(camX, i); ctx.lineTo(camX+width, i); }
            ctx.stroke();

            gameState.food.forEach(f => {
                if(f.x > camX - 20 && f.x < camX + width + 20 && f.y > camY - 20 && f.y < camY + height + 20) {
                    ctx.fillStyle = f.color; 
                    ctx.beginPath(); 
                    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2); 
                    ctx.fill();
                }
            });

            for (let id in gameState.snakes) {
                let snake = gameState.snakes[id];
                
                // Gövde Desenlerini Uygulama
                let currentPattern = (snake.pattern && bodyPatterns[snake.pattern]) ? bodyPatterns[snake.pattern] : null;

                for (let i = 0; i < snake.body.length; i+=2) { 
                    let segment = snake.body[i]; 
                    
                    // Eğer deseni varsa sırayla renkleri değiştir, yoksa tek renk kullan
                    if(currentPattern) {
                        ctx.fillStyle = currentPattern[Math.floor(i / 2) % currentPattern.length];
                    } else {
                        ctx.fillStyle = snake.color;
                    }

                    ctx.beginPath();
                    let radius = snake.size * (1 - (i / snake.body.length) * 0.4);
                    ctx.arc(segment.x, segment.y, radius, 0, Math.PI * 2); 
                    ctx.fill();
                }

                // Kafa Çizimi
                let isHeadDrawn = false;
                if (snake.skin && skinImages[snake.skin] && skinImages[snake.skin].complete) {
                    let img = skinImages[snake.skin];
                    if (img.naturalWidth > 0) { 
                        ctx.save();
                        ctx.translate(snake.x, snake.y);
                        ctx.rotate(Math.PI / 2 - snake.angle); 
                        let r = snake.size * 1.5;
                        ctx.drawImage(img, -r, -r, r * 2, r * 2);
                        ctx.restore();
                        isHeadDrawn = true;
                    }
                }
                
                // Resim seçilmediyse kafayı çiz (Desenin ilk rengiyle veya klasik renkle)
                if (!isHeadDrawn) {
                    ctx.fillStyle = currentPattern ? currentPattern[0] : snake.color;
                    ctx.beginPath(); ctx.arc(snake.x, snake.y, snake.size, 0, Math.PI * 2); ctx.fill();
                    
                    // Göz eklentisi (Kafa belli olsun diye)
                    ctx.fillStyle = "white";
                    let eyeOffsetX = Math.cos(snake.angle + Math.PI/4) * (snake.size * 0.5);
                    let eyeOffsetY = -Math.sin(snake.angle + Math.PI/4) * (snake.size * 0.5);
                    ctx.beginPath(); ctx.arc(snake.x + eyeOffsetX, snake.y + eyeOffsetY, snake.size * 0.3, 0, Math.PI * 2); ctx.fill();
                    
                    let eyeOffsetX2 = Math.cos(snake.angle - Math.PI/4) * (snake.size * 0.5);
                    let eyeOffsetY2 = -Math.sin(snake.angle - Math.PI/4) * (snake.size * 0.5);
                    ctx.beginPath(); ctx.arc(snake.x + eyeOffsetX2, snake.y + eyeOffsetY2, snake.size * 0.3, 0, Math.PI * 2); ctx.fill();
                    
                    ctx.fillStyle = "black";
                    ctx.beginPath(); ctx.arc(snake.x + eyeOffsetX, snake.y + eyeOffsetY, snake.size * 0.15, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(snake.x + eyeOffsetX2, snake.y + eyeOffsetY2, snake.size * 0.15, 0, Math.PI * 2); ctx.fill();
                }

                ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
                let displayName = id === myId ? "Sen (" + snake.name + ")" : snake.name;
                ctx.fillText(displayName, snake.x, snake.y - snake.size - 10);
            }
            ctx.restore();

            if (gameState.leaderboard && gameState.leaderboard.length > 0) {
                let lbX = width - 180; let lbY = 20;
                ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.roundRect(lbX, lbY, 160, 150, 10); ctx.fill();
                ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
                ctx.fillText("Sıralama", lbX + 80, lbY + 25);
                ctx.textAlign = "left"; ctx.font = "14px Arial";
                gameState.leaderboard.forEach((player, index) => {
                    let yPos = lbY + 50 + (index * 20);
                    let color = index === 0 ? "#FFD700" : (index === 1 ? "#C0C0C0" : "#CD7F32");
                    if(index > 2) color = "white";
                    ctx.fillStyle = color;
                    ctx.fillText(`${index + 1}. ${player.name}`, lbX + 10, yPos);
                    ctx.fillText(player.score, lbX + 120, yPos);
                });
            }
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
                this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + r, y, r); this.closePath(); return this;
            }
        }
    </script>
