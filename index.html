<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yılanss.io</title>
    <link rel="icon" type="image/png" href="yılanss.png">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #040a18; 
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            -webkit-user-select: none; user-select: none; 
        }
        
        #gameCanvas { display: block; position: absolute; top:0; left:0; z-index: 1; }

        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #06112a 0%, #0a1931 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; color: white; text-align: center;
        }
        .loading-images { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .loading-images img { width: 120px; height: 120px; object-fit: contain; animation: pulseLoading 1.5s infinite; filter: drop-shadow(0 0 15px rgba(255,255,255,0.2)); }
        @keyframes pulseLoading {
            0% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.8; }
        }
        #loading-bar-container {
            width: 80%; max-width: 400px; height: 15px; background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(0,0,0,0.5) inset;
        }
        #loading-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, #2ecc71, #27ae60);
            transition: width 0.2s ease-out; box-shadow: 0 0 15px rgba(46, 204, 113, 0.8);
        }
        
        #main-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(10, 25, 49, 0.8) 0%, rgba(4, 10, 24, 0.95) 100%);
            display: none; z-index: 100; pointer-events: none; 
        }
        .menu-element { pointer-events: auto; position: absolute; } 

        #money-display {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 10px 25px; border-radius: 20px; 
            border: 2px solid #f1c40f; color: #f1c40f; font-weight: bold; font-size: 18px; 
            z-index: 110; pointer-events: none; box-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
            white-space: nowrap;
        }

        #top-left-ui { top: 20px; left: 20px; display: flex; flex-direction: column; align-items: flex-start; z-index: 110;}
        #menu-logo-small { width: 80px; height: 80px; border-radius: 50%; box-shadow: 0 0 20px rgba(76, 175, 80, 0.6); margin-bottom: 10px; }
        #playerName {
            padding: 15px 20px; border: 2px solid rgba(255,255,255,0.2); border-radius: 30px;
            background: rgba(0,0,0,0.6); color: white; font-size: 18px; font-weight: bold; width: 220px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); outline: none; transition: 0.3s;
        }
        #playerName:focus { border-color: #4CAF50; background: rgba(0,0,0,0.8); box-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }

        #fullscreen-btn {
            top: 20px; right: 20px; background: rgba(0,0,0,0.5); color: white;
            border: 2px solid rgba(255,255,255,0.2); padding: 10px 15px; border-radius: 20px;
            font-weight: bold; cursor: pointer; transition: 0.2s; z-index: 110;
        }
        #fullscreen-btn:hover { background: #4CAF50; border-color: #4CAF50; box-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }

        /* SOL DUVAR MENÜSÜ */
        #left-wall-ui {
            top: 50%; left: 30px; transform: translateY(-40%);
            display: flex; flex-direction: column; gap: 20px; align-items: flex-start;
        }

        .design-panel {
            background: rgba(10, 20, 40, 0.95); padding: 15px; border-radius: 20px;
            border: 2px solid rgba(65, 105, 225, 0.5); box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(65, 105, 225, 0.2);
            text-align: center; width: 160px; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .design-panel h3 { color: #fff; margin: 0; font-size: 16px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        #patternPreviewCanvas { width: 80px; height: 80px; }
        .head-preview-box {
            width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff;
            display: flex; justify-content: center; align-items: center; background: #222;
            font-weight: bold; color: white; font-size: 14px; overflow: hidden; box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .head-preview-box img { width: 100%; height: 100%; object-fit: cover; }
        .selection-name { color: #2ecc71; font-weight: bold; font-size: 14px; background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 15px; width: 100%; box-sizing: border-box; text-shadow: 0 0 5px rgba(46, 204, 113, 0.5); }

        .btn-select {
            background: linear-gradient(135deg, #3498db, #2980b9); color: white; border: none;
            padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4); transition: 0.2s;
        }
        .btn-select:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(52, 152, 219, 0.8); }

        /* SEÇİM MODALI (GRID) */
        .selection-modal-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 200; justify-content: center; align-items: center; pointer-events: auto;
        }
        .selection-modal-content {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 30px; border-radius: 20px; border: 2px solid #3498db;
            color: white; text-align: center; max-width: 80%; max-height: 80%; overflow-y: auto; box-shadow: 0 0 40px rgba(52, 152, 219, 0.6);
        }
        .selection-modal-content h2 { color: #2ecc71; margin-top: 0; }
        .selection-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 15px; margin-top: 20px;
        }
        .grid-item {
            background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 10px; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; height: 110px;
        }
        .grid-item:hover, .grid-item.selected { background: rgba(46, 204, 113, 0.2); border-color: #2ecc71; transform: scale(1.05); }
        .grid-item canvas { width: 60px; height: 60px; }
        .grid-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 50%; }
        .grid-item .placeholder { width: 60px; height: 60px; background: #222; border-radius: 50%; display:flex; justify-content:center; align-items:center; font-size:12px; }
        .grid-item span { font-size: 13px; font-weight: bold; color: #ddd; text-align: center; }

        #bottom-right-ui { bottom: 30px; right: 30px; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        
        .game-select-style {
            background: rgba(0,0,0,0.8); color: white; border: 2px solid rgba(255,255,255,0.3);
            padding: 12px 15px; border-radius: 15px; font-weight: bold; font-size: 15px;
            outline: none; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.2s; width: 100%;
        }
        .game-select-style:hover { border-color: #f39c12; box-shadow: 0 0 15px rgba(243, 156, 18, 0.5); }

        #bottom-left-ui { bottom: 30px; left: 30px; display: flex; flex-direction: column; align-items: flex-start; }
        #settings-btn {
            background: rgba(0,0,0,0.8); color: white; border: 2px solid rgba(255,255,255,0.3);
            padding: 12px 20px; border-radius: 20px; font-weight: bold; font-size: 18px;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.2s;
        }
        #settings-btn:hover { border-color: #3498db; background: rgba(52, 152, 219, 0.4); transform: scale(1.05); box-shadow: 0 0 15px rgba(52, 152, 219, 0.6); }

        #settings-modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 300; justify-content: center; align-items: center; pointer-events: auto;
        }
        .settings-content {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 40px; border-radius: 20px; border: 2px solid #3498db;
            color: white; text-align: center; box-shadow: 0 0 40px rgba(52, 152, 219, 0.6); min-width: 300px;
        }
        .settings-content h2 { margin-top: 0; color: #3498db; font-size: 28px; text-shadow: 0 0 10px rgba(52,152,219,0.5); }
        .setting-row { margin: 25px 0; font-size: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .setting-row input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; }
        .setting-row select { font-size: 18px; padding: 5px 10px; border-radius: 10px; background: rgba(0,0,0,0.6); color: white; border: 1px solid #3498db; cursor: pointer; outline: none; }

        #host-lobby-modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 150; justify-content: center; align-items: center; pointer-events: auto;
        }
        .lobby-content {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 40px; border-radius: 20px; border: 2px solid #2ecc71;
            color: white; text-align: center; box-shadow: 0 0 40px rgba(46, 204, 113, 0.6); max-width: 90%;
        }
        .lobby-id-box { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        #lobby-room-id {
            padding: 12px; font-size: 20px; text-align: center; border-radius: 10px; border: none; font-weight: bold; background: #fff; color: #000; width: 200px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        #lobby-copy-btn {
            padding: 12px 20px; font-size: 18px; background: linear-gradient(135deg, #3498db, #2980b9); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        #lobby-copy-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(52, 152, 219, 0.8); }

        .room-group { display: flex; gap: 10px; align-items: center; width: 100%; }
        #hostIdInput {
            padding: 12px 15px; border-radius: 10px; border: none; background: rgba(255,255,255,0.95);
            font-weight: bold; width: 140px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); flex-grow: 1;
        }
        .btn-join {
            background: linear-gradient(135deg, #f39c12, #d35400); color: white; border: none;
            padding: 12px 20px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.4); transition: 0.2s;
        }
        .btn-join:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(211, 84, 0, 0.6); }

        .btn-start {
            background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border: none;
            padding: 20px 50px; border-radius: 30px; font-size: 28px; font-weight: bold; cursor: pointer; width: 100%;
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.5); transition: 0.2s; animation: pulseStart 2s infinite;
        }
        .btn-start:hover { transform: scale(1.05); background: linear-gradient(135deg, #27ae60, #1e8449); }
        
        @keyframes pulseStart {
            0% { box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
            50% { box-shadow: 0 0 40px rgba(46, 204, 113, 0.9); }
            100% { box-shadow: 0 0 15px rgba(46, 204, 113, 0.4); }
        }

        /* MİNİMALİST OYUN İÇİ ARAYÜZ */
        #game-ui { 
            position: absolute; top: 15px; left: 15px; z-index: 10; display: none; 
            flex-direction: column; gap: 10px; font-family: 'Segoe UI', sans-serif; pointer-events: none; 
        }
        #game-ui button { pointer-events: auto; }
        
        #minimal-menu-btn {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ddd; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold;
            cursor: pointer; transition: 0.2s; backdrop-filter: blur(4px);
        }
        #minimal-menu-btn:hover { background: rgba(231, 76, 60, 0.8); color: white; border-color: #e74c3c; }

        #combo-text {
            position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%);
            font-size: 50px; font-weight: 900; color: #f39c12; text-shadow: 0 0 20px rgba(243, 156, 18, 0.8), 2px 2px 0 #000;
            z-index: 200; pointer-events: none; opacity: 0; transition: opacity 0.2s, transform 0.2s;
            text-align: center; font-style: italic;
        }

        #death-screen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); color: white; z-index: 50;
            flex-direction: column; justify-content: center; align-items: center; pointer-events: auto;
        }
        #death-screen h1 { font-size: 64px; color: #ff4757; margin-bottom: 10px; text-shadow: 0 0 30px rgba(255, 71, 87, 0.8); }
        .death-buttons { display: flex; gap: 15px; margin-top: 20px; }
        .menu-btn-small { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); transition: 0.2s;}
        .menu-btn-small:hover { transform: scale(1.05); box-shadow: 0 5px 25px rgba(46, 204, 113, 0.7); }
        .menu-btn-small.exit { background: linear-gradient(135deg, #e74c3c, #c0392b); box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4); }
        .menu-btn-small.exit:hover { box-shadow: 0 5px 25px rgba(231, 76, 60, 0.7); }

        #joystick-zone { position: absolute; bottom: 20px; left: 20px; width: 130px; height: 130px; z-index: 10; display: none; }
        #boost-btn {
            position: absolute; bottom: 30px; right: 30px; width: 80px; height: 80px;
            background: radial-gradient(circle, rgba(255, 107, 129, 0.9) 0%, rgba(255, 71, 87, 0.9) 100%);
            color: white; border-radius: 50%;
            display: none; justify-content: center; align-items: center; text-align: center;
            font-size: 14px; font-weight: bold; border: 3px solid rgba(255,255,255,0.6);
            z-index: 20; box-shadow: 0 0 25px rgba(255, 71, 87, 0.7); transition: 0.1s;
            user-select: none; -webkit-user-select: none; cursor: pointer;
        }
        #boost-btn:active { background: #ff4757; transform: scale(0.9); box-shadow: 0 0 40px rgba(255, 71, 87, 1); border-color: white; }

        #powerup-ui {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 15; pointer-events: none;
        }
        .pu-box {
            background: rgba(0, 0, 0, 0.9); padding: 8px 15px; border-radius: 20px;
            border: 2px solid #fff; color: white; font-weight: bold; font-size: 18px;
            display: flex; align-items: center; gap: 8px; box-shadow: 0 0 20px rgba(255,255,255,0.4);
            display: none;
        }
        .pu-box.magnet { border-color: #3498db; box-shadow: 0 0 20px rgba(52, 152, 219, 0.6); }
        .pu-box.ghost { border-color: #ecf0f1; box-shadow: 0 0 20px rgba(236, 240, 241, 0.6); }
        .pu-box.x2 { border-color: #f1c40f; box-shadow: 0 0 20px rgba(241, 196, 15, 0.6); }
        .pu-box.shield { border-color: #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.6); }
        
        .pu-time { font-size: 20px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .pu-time.warning { color: #e74c3c; animation: blink 0.4s infinite alternate; }
        @keyframes blink { from { opacity: 1; text-shadow: 0 0 10px red; } to { opacity: 0.5; text-shadow: none; color: white; } }

        #orientation-warning {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #c0392b, #e74c3c); color: white; z-index: 200;
            text-align: center; flex-direction: column; justify-content: center; align-items: center; font-size: 24px; font-weight: bold;
        }
        @media screen and (orientation: portrait) { #orientation-warning { display: flex; } }

        @media (max-width: 850px), (max-height: 600px) {
            #money-display { top: 10px; padding: 6px 15px; font-size: 14px; }
            #top-left-ui { top: 10px; left: 10px; }
            #menu-logo-small { display: none !important; } 
            #playerName { width: 120px; padding: 8px 12px; font-size: 13px; margin: 0; }
            
            #fullscreen-btn { top: 10px; right: 10px; padding: 8px 10px; font-size: 12px; }
            #bottom-left-ui { top: 10px; right: 105px; bottom: auto; left: auto; } 
            #settings-btn { padding: 8px 10px; font-size: 12px; margin: 0;}

            #left-wall-ui { 
                top: auto; bottom: 10px; left: 10px; transform: none; 
                flex-direction: row; gap: 10px; 
            }
            .design-panel { width: 100px; padding: 8px; gap: 5px; border-radius: 15px;}
            .design-panel h3 { font-size: 11px; margin-bottom: 2px; }
            #patternPreviewCanvas { width: 45px; height: 45px; }
            .head-preview-box { width: 45px; height: 45px; border-width: 2px; font-size: 11px; }
            .selection-name { font-size: 10px; padding: 4px; border-radius: 8px; }
            .btn-select { padding: 5px 8px; font-size: 11px; border-radius: 8px; }

            #bottom-right-ui { bottom: 10px; right: 10px; gap: 8px; transform: scale(0.9); transform-origin: bottom right; width: 160px;}
            .game-select-style { padding: 6px 8px; font-size: 11px; }
            .room-group { gap: 5px; }
            #hostIdInput { width: 80px; padding: 6px; font-size: 11px; }
            .btn-join { padding: 6px 10px; font-size: 11px; }
            .btn-start { padding: 10px 20px; font-size: 16px; border-radius: 20px;}

            #boost-btn { bottom: 15px; right: 15px; width: 60px; height: 60px; font-size: 10px; border-width: 2px;}
            .pu-box { padding: 4px 8px; font-size: 12px; gap: 4px; }
            .pu-time { font-size: 13px; }
            
            .selection-grid { grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 8px; }
            .selection-modal-content { padding: 15px; width: 95%; }
            .grid-item { height: 85px; padding: 5px; }
            .grid-item canvas, .grid-item img, .grid-item .placeholder { width: 45px; height: 45px; }
            .grid-item span { font-size: 10px; }
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>
<body>

    <div id="orientation-warning"><p>Lütfen cihazınızı yan çevirin!</p></div>

    <div id="loading-screen">
        <div class="loading-images">
            <img src="yılanss.png" alt="Yılanss" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='">
            <img src="Yükleme1.png" alt="Yükleniyor" onerror="this.src='data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs='">
        </div>
        <h2 style="margin-bottom: 20px; font-size: 24px; text-shadow: 0 0 10px rgba(255,255,255,0.5);"><span id="loading-text">Oyun Hazırlanıyor...</span></h2>
        <div id="loading-bar-container">
            <div id="loading-bar"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="main-menu">
        <div id="money-display">
            💰 <span id="total-money">0</span>
        </div>
        <div id="top-left-ui" class="menu-element">
            <img src="yılanss.png" id="menu-logo-small" alt="Logo" onerror="this.style.display='none'">
            <input type="text" id="playerName" placeholder="Oyuncu Adı" value="">
        </div>

        <button id="fullscreen-btn" class="menu-element" onclick="requestFullScreen()">🔲 Tam Ekran</button>

        <div id="left-wall-ui" class="menu-element">
            <div class="design-panel">
                <h3>Yılan Desenleri</h3>
                <canvas id="patternPreviewCanvas"></canvas>
                <div id="pattern-name" class="selection-name">Klasik</div>
                <button class="btn-select" onclick="openSelectionModal('pattern')">Desen Seç</button>
            </div>

            <div class="design-panel">
                <h3>Kafalar</h3>
                <div id="head-preview-box" class="head-preview-box">Düz</div>
                <div id="head-name" class="selection-name">Düz Seçim</div>
                <button class="btn-select" onclick="openSelectionModal('head')">Kafa Seç</button>
            </div>
        </div>

        <div id="bottom-left-ui" class="menu-element">
            <button id="settings-btn" onclick="openSettings()">⚙️ Ayarlar</button>
        </div>

        <div id="bottom-right-ui" class="menu-element">
            <select id="botDifficultySelect" class="game-select-style">
                <option value="easy">🤖 Bot Zorluğu: Kolay</option>
                <option value="normal" selected>🤖 Bot Zorluğu: Normal</option>
                <option value="hard">🤖 Bot Zorluğu: Zor</option>
            </select>

            <select id="gameModeSelect" class="game-select-style">
                <option value="classic">🟢 Mod: Klasik</option>
                <option value="overpowered">🔥 Mod: Güçlü Başlangıç</option>
            </select>

            <div class="room-group">
                <input type="text" id="hostIdInput" placeholder="Oda ID">
                <button class="btn-join" onclick="joinGame()">Katıl</button>
            </div>
            <button class="btn-start" onclick="hostRoom()">ODA KUR</button>
        </div>
    </div>

    <div id="selection-modal" class="selection-modal-overlay">
        <div class="selection-modal-content">
            <h2 id="selection-title">Seçim Yap</h2>
            <div id="selection-grid" class="selection-grid"></div>
            <button class="menu-btn-small exit" onclick="closeSelectionModal()" style="margin-top: 20px; width:150px;">Kapat</button>
        </div>

    <script>
        // --- GRAFİK AYARLARI ---
        let graphicsQuality = localStorage.getItem('yilanss_graphics') || 'high';
        let MAX_FOOD = 500;
        let FPS = 60;
        let fpsInterval = 1000 / FPS;

        function applyGraphicsSettings() {
            if (graphicsQuality === 'low') { MAX_FOOD = 150; }
            else if (graphicsQuality === 'medium') { MAX_FOOD = 300; }
            else { MAX_FOOD = 500; }
            fpsInterval = 1000 / FPS;
        }

        function changeGraphics() {
            graphicsQuality = document.getElementById('graphicsSelect').value;
            localStorage.setItem('yilanss_graphics', graphicsQuality);
            applyGraphicsSettings();
        }

        // --- BOT ZORLUK AYARLARI (GÜNCELLENDİ) ---
        let currentBotDifficulty = 'normal';
        const botDiffConfigs = {
            'easy': { frameCheck: 15, foodChecks: 20, viewDistSq: 160000, attackDistSq: 22500, aggression: 0.2 }, 
            'normal': { frameCheck: 8, foodChecks: 50, viewDistSq: 360000, attackDistSq: 40000, aggression: 0.7 }, 
            'hard': { frameCheck: 2, foodChecks: 150, viewDistSq: 1000000, attackDistSq: 250000, aggression: 1.0 } // İnanılmaz agresif ve uzağı görür
        };

        let userMoney = parseInt(localStorage.getItem('yilanss_money')) || 0;
        document.addEventListener("DOMContentLoaded", () => {
            let el = document.getElementById('total-money');
            if(el) el.innerText = userMoney;
            
            let gSelect = document.getElementById('graphicsSelect');
            if(gSelect) gSelect.value = graphicsQuality;
            applyGraphicsSettings();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let width = window.innerWidth; let height = window.innerHeight;
        canvas.width = width; canvas.height = height;

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        });

        function requestFullScreen() {
            let el = document.documentElement;
            if (!document.fullscreenElement) {
                if (el.requestFullscreen) { el.requestFullscreen(); } 
                else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
            }
            
            // Ekranı yatay (landscape) modda kilitlemeye zorla
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(function(error) {
                    console.log("Ekran döndürme kilitlenemedi: ", error);
                });
            }
        }

        let audioCtx;
        let soundEnabled = true;

        function toggleSound() { soundEnabled = document.getElementById('soundToggle').checked; }

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playExplosionSound() {
            if (!soundEnabled || !audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const bufferSize = audioCtx.sampleRate * 0.5; 
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1; 
            
            const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1000, audioCtx.currentTime); filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.4); 
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4); 
            
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            noise.start();
        }

        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

        let currentRoomId = "";
        function copyLobbyRoomId() {
            if(!currentRoomId) return;
            navigator.clipboard.writeText(currentRoomId).then(() => {

        const bodyPatterns = {
            'gokkusagi': ['#ff3b3b', '#ff9f43', '#feca57', '#1dd1a1', '#2e86de', '#8395a7', '#9b59b6'],
            'kaplan': ['#ff9f43', '#222f3e', '#ff9f43', '#ffffff'],
            'zebra': ['#ffffff', '#222f3e', '#ffffff', '#576574'],
            'ates': ['#ff4757', '#ff6b81', '#ffa502', '#ff4757'],
            'okyanus': ['#0abde3', '#48dbfb', '#00d2d3', '#2e86de'],
            'neon': ['#ff9ff3', '#00d2d3', '#feca57', '#48dbfb'],
            'orman': ['#1dd1a1', '#10ac84', '#01a3a4', '#1dd1a1'],
            'galaksi': ['#2c3e50', '#8e44ad', '#9b59b6', '#f39c12'],
            'seker': ['#ff9ff3', '#ffffff', '#48dbfb', '#feca57'],
            'zehir': ['#8e44ad', '#1dd1a1', '#9b59b6', '#10ac84'],
            'lav': ['#b33939', '#218c74', '#ff5252', '#b33939'],
            'ari': ['#f1c40f', '#2c3e50', '#f1c40f', '#2c3e50'],
            'karpuz': ['#27ae60', '#e74c3c', '#2c3e50', '#e74c3c'],
            'kamuflaj': ['#78e08f', '#38ada9', '#b8e994', '#079992'],
            'buzul': ['#ffffff', '#c8d6e5', '#8395a7', '#54a0ff'],
            'kristal': ['rgba(0, 210, 211, 0.6)', 'rgba(255, 255, 255, 0.4)', 'rgba(0, 210, 211, 0.3)'],
            'hayalet': ['rgba(255, 255, 255, 0.2)', 'rgba(255, 255, 255, 0.1)'],
            'altin': ['#f1c40f', '#f39c12', '#d4af37']
        };
        const patternKeys = [null, ...Object.keys(bodyPatterns)];
        const patternNames = ["Klasik", "Gökkuşağı", "Kaplan", "Zebra", "Ateş", "Okyanus", "Neon", "Orman", "Galaksi", "Şeker", "Zehir", "Lav", "Arı", "Karpuz", "Kamuflaj", "Buzul", "Kristal", "Hayalet", "Altın"];
        
        const headKeys = [null, 'ömer', 'yusuf', 'enes', 'samet', 'tanju', 'teyfik', 'adem', 'ömer2'];
        const headNames = ["Düz", "Ömer", "Yusuf", "Enes", "Samet", "Tanju", "Teyfik", "Adem", "Ömer 2"];

        const comboNames = ["", "KİLL!", "DOUBLE KİLL!", "TRİPLE KİLL!", "MEGA KİLL!", "MONSTER KİLL!", "GODLİKE!"];

        function showComboText(count) {
            const el = document.getElementById('combo-text');
            const name = comboNames[Math.min(count, comboNames.length - 1)] || "GODLİKE!";
            el.innerText = name;
            el.style.opacity = "1";
            el.style.transform = "translate(-50%, -50%) scale(1.3)";
            el.style.color = count > 3 ? "#ff4757" : "#f39c12";
            
            if(window.comboTimeout) clearTimeout(window.comboTimeout);
            window.comboTimeout = setTimeout(() => { 
                el.style.opacity = "0"; 
                el.style.transform = "translate(-50%, -50%) scale(1)";
            }, 1500);
        }

        let currentPatternIndex = 0; let currentHeadIndex = 0;
        let myPattern = null; let mySkin = null;

        const baseColors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#ff6b81', '#7bed9f', '#70a1ff', '#eccc68', '#ff7f50', '#ffffff'];
        
        const foodCache = {};
        const segmentCache = {};
        const powerupCache = {}; 
        let hexBackgroundPattern = null;

        function darkenColor(color, percent) {
            if (color.startsWith('rgba')) return color;
            let num = parseInt(color.replace("#",""),16),
            amt = Math.round(2.55 * percent),
            R = (num >> 16) + amt, B = (num >> 8 & 0x00FF) + amt, G = (num & 0x0000FF) + amt;
            return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 + (B<255?B<1?0:B:255)*0x100 + (G<255?G<1?0:G:255)).toString(16).slice(1);
        }

        function initCaches() {
            baseColors.forEach(color => {
                let oc = document.createElement('canvas');
                let r = 20; 
                oc.width = r*2; oc.height = r*2;
                let octx = oc.getContext('2d');
                
                let fGrad = octx.createRadialGradient(r - r/3, r - r/3, 0, r, r, r);
                fGrad.addColorStop(0, '#ffffff'); 
                fGrad.addColorStop(0.3, color); 
                fGrad.addColorStop(1, color === '#ffffff' ? '#dddddd' : darkenColor(color, -30));
                
                octx.fillStyle = fGrad;
                octx.beginPath(); octx.arc(r, r, r, 0, Math.PI*2); octx.fill();
                foodCache[color] = oc;
            });

            let allColors = new Set([...baseColors]);
            for(let key in bodyPatterns) { bodyPatterns[key].forEach(c => allColors.add(c)); }
            
            allColors.forEach(color => {
                let oc = document.createElement('canvas');
                let r = 40; 
                oc.width = r*2; oc.height = r*2;
                let octx = oc.getContext('2d');

                octx.fillStyle = color;
                octx.beginPath(); octx.arc(r, r, r*0.8, 0, Math.PI*2); octx.fill();
                octx.strokeStyle = darkenColor(color, -20); octx.lineWidth = r*0.12; octx.stroke();

                octx.fillStyle = 'rgba(255,255,255,0.3)';
                octx.beginPath(); octx.arc(r - r*0.25, r - r*0.25, r*0.35, 0, Math.PI*2); octx.fill();

                segmentCache[color] = oc;
            });

            ['magnet', 'ghost', 'x2', 'shield'].forEach(type => {
                let oc = document.createElement('canvas');
                let size = 20; let totalSize = size * 1.5;
                oc.width = totalSize * 2; oc.height = totalSize * 2;
                let octx = oc.getContext('2d');
                octx.translate(totalSize, totalSize);

                octx.fillStyle = type === 'magnet' ? 'rgba(52, 152, 219, 0.4)' : (type === 'ghost' ? 'rgba(236, 240, 241, 0.4)' : (type === 'shield' ? 'rgba(46, 204, 113, 0.4)' : 'rgba(241, 196, 15, 0.4)'));
                octx.beginPath(); octx.arc(0, 0, totalSize, 0, Math.PI*2); octx.fill();

                let pGrad = octx.createRadialGradient(-size/3, -size/3, 0, 0, 0, size);
                pGrad.addColorStop(0, '#ffffff');
                if(type === 'magnet') { pGrad.addColorStop(0.3, '#3498db'); pGrad.addColorStop(1, '#2980b9'); }
                else if(type === 'ghost') { pGrad.addColorStop(0.3, '#ecf0f1'); pGrad.addColorStop(1, '#bdc3c7'); }
                else if(type === 'shield') { pGrad.addColorStop(0.3, '#2ecc71'); pGrad.addColorStop(1, '#27ae60'); }
                else if(type === 'x2') { pGrad.addColorStop(0.3, '#f1c40f'); pGrad.addColorStop(1, '#f39c12'); }
                
                octx.fillStyle = pGrad; octx.beginPath(); octx.arc(0, 0, size, 0, Math.PI*2); octx.fill();
                
                octx.fillStyle = type === 'ghost' ? '#333' : 'white'; 
                octx.textAlign = 'center'; octx.textBaseline = 'middle'; octx.font = 'bold 18px Arial';
                if(type === 'magnet') octx.fillText('🧲', 0, 1);
                else if(type === 'ghost') octx.fillText('👻', 0, 1);
                else if(type === 'shield') octx.fillText('🛡️', 0, 1);
                else if(type === 'x2') octx.fillText('2X', 0, 1);
                
                powerupCache[type] = oc;
            });
            
            initHexPattern();
        }

        function initHexPattern() {
            const R = 45; 
            const W = Math.sqrt(3) * R;
            const H = 3 * R;

            const bgCanvas = document.createElement('canvas');
            bgCanvas.width = Math.ceil(W);
            bgCanvas.height = Math.ceil(H);
            const bgCtx = bgCanvas.getContext('2d');

            bgCtx.strokeStyle = 'rgba(52, 152, 219, 0.15)';
            bgCtx.lineWidth = 2;

            function drawHex(cx, cy) {
                bgCtx.beginPath();
                bgCtx.moveTo(cx, cy - R);
                bgCtx.lineTo(cx + W/2, cy - R/2);
                bgCtx.lineTo(cx + W/2, cy + R/2);
                bgCtx.lineTo(cx, cy + R);
                bgCtx.lineTo(cx - W/2, cy + R/2);
                bgCtx.lineTo(cx - W/2, cy - R/2);
                bgCtx.closePath();
                bgCtx.stroke();
                
                bgCtx.fillStyle = 'rgba(52, 152, 219, 0.4)';
                bgCtx.beginPath(); bgCtx.arc(cx, cy, 2.5, 0, Math.PI*2); bgCtx.fill();
                
                bgCtx.strokeStyle = 'rgba(52, 152, 219, 0.08)';
                bgCtx.beginPath(); bgCtx.arc(cx, cy, R*0.45, 0, Math.PI*2); bgCtx.stroke();
                bgCtx.strokeStyle = 'rgba(52, 152, 219, 0.15)'; 
            }

            drawHex(0, 0);
            drawHex(W, 0);
            drawHex(W/2, 1.5 * R);
            drawHex(0, 3 * R);
            drawHex(W, 3 * R);
            
            hexBackgroundPattern = ctx.createPattern(bgCanvas, 'repeat');
        }

        initCaches();

        const skinImages = {};
        const assetsToLoad = [
            { id: 'ömer', src: 'ömer.png', type: 'skin' },
            { id: 'yusuf', src: 'yusuf.png', type: 'skin' },
            { id: 'enes', src: 'enes.png', type: 'skin' },
            { id: 'samet', src: 'samet.png', type: 'skin' },
            { id: 'tanju', src: 'tanju.png', type: 'skin' },
            { id: 'teyfik', src: 'teyfik.png', type: 'skin' },
            { id: 'adem', src: 'adem.png', type: 'skin' },
            { id: 'ömer2', src: 'ömer2.png', type: 'skin' },
            { id: 'logo', src: 'yılanss.png', type: 'img' },
            { id: 'loading', src: 'Yükleme1.png', type: 'img' }
        ];

        let loadedAssets = 0;
        
        window.onload = () => {
            if (assetsToLoad.length === 0) return finishLoading();
            assetsToLoad.forEach(asset => {
                let img = new Image(); img.src = asset.src;
                img.onload = img.onerror = () => {
                    loadedAssets++;
                    let percent = Math.floor((loadedAssets / assetsToLoad.length) * 100);
                    document.getElementById('loading-bar').style.width = percent + '%';
                    if(document.getElementById('loading-text')) document.getElementById('loading-text').innerText = percent + '%';
                    if (asset.type === 'skin') skinImages[asset.id] = img;
                    if (loadedAssets === assetsToLoad.length) setTimeout(finishLoading, 600); 
                };
            });
        };

        function updateMenus() {
            myPattern = patternKeys[currentPatternIndex]; 
            mySkin = headKeys[currentHeadIndex];
            document.getElementById('pattern-name').innerText = patternNames[currentPatternIndex];
            document.getElementById('head-name').innerText = headNames[currentHeadIndex];
            
            let headBox = document.getElementById('head-preview-box');
            if(mySkin) {
                headBox.innerHTML = `<img src="${mySkin}.png" onerror="this.style.display='none'; this.parentNode.innerHTML='Düz';">`;
            } else {
                headBox.innerHTML = "Düz";
            }
        }

        function openSelectionModal(type) {
            const modal = document.getElementById('selection-modal');
            const grid = document.getElementById('selection-grid');
            const title = document.getElementById('selection-title');
            grid.innerHTML = "";
            modal.style.display = "flex";

            if (type === 'pattern') {
                title.innerText = "Desen Seç";
                patternKeys.forEach((key, index) => {
                    let div = document.createElement('div');
                    div.className = "grid-item" + (currentPatternIndex === index ? " selected" : "");
                    div.onclick = () => { currentPatternIndex = index; closeSelectionModal(); updateMenus(); };
                    
                    let cvs = document.createElement('canvas');
                    cvs.width = 60; cvs.height = 60;
                    let ctxCvs = cvs.getContext('2d');
                    let colors = key ? bodyPatterns[key] : ['#2ecc71'];
                    colors.forEach((c, i) => {
                        ctxCvs.fillStyle = c;
                        ctxCvs.beginPath(); ctxCvs.arc(30, 15 + i*8, 8, 0, Math.PI*2); ctxCvs.fill();
                    });
                    
                    let span = document.createElement('span');
                    span.innerText = patternNames[index];
                    
                    div.appendChild(cvs); div.appendChild(span); grid.appendChild(div);
                });
            } else if (type === 'head') {
                title.innerText = "Kafa Seç";
                headKeys.forEach((key, index) => {
                    let div = document.createElement('div');
                    div.className = "grid-item" + (currentHeadIndex === index ? " selected" : "");
                    div.onclick = () => { currentHeadIndex = index; closeSelectionModal(); updateMenus(); };
                    
                    if (key) {
                        let img = document.createElement('img');
                        img.src = key + '.png';
                        div.appendChild(img);
                    } else {
                        let placeholder = document.createElement('div');
                        placeholder.className = "placeholder";
                        placeholder.innerText = "Düz";
                        div.appendChild(placeholder);
                    }
                    
                    let span = document.createElement('span');
                    span.innerText = headNames[index];
                    
                    div.appendChild(span); grid.appendChild(div);
                });
            }
        }

        function closeSelectionModal() {
            document.getElementById('selection-modal').style.display = "none";
        }

        let previewTime = 0;
        function animatePatternPreview() {
            if(!inMenuMode) return;
            const pCanvas = document.getElementById('patternPreviewCanvas');
            if(pCanvas) {
                pCanvas.width = 80; pCanvas.height = 80;
                const pCtx = pCanvas.getContext('2d'); pCtx.clearRect(0,0, 80, 80);
                previewTime += 0.1;
                let currentP = myPattern ? bodyPatterns[myPattern] : null;
                let segments = [];
                for(let i=0; i<10; i++) { let x = 40 + Math.sin(previewTime - i * 0.4) * 15; let y = 10 + i * 6; segments.push({x, y}); }
                for(let i=segments.length-1; i>=0; i--) {
                    let color = currentP ? currentP[Math.floor(i / 2) % currentP.length] : '#2ecc71';
                    pCtx.fillStyle = color;
                    let radius = 10 * (1 - (i / 15) * 0.4);
                    pCtx.beginPath(); pCtx.arc(segments[i].x, segments[i].y, radius, 0, Math.PI*2); pCtx.fill();
                    pCtx.fillStyle = 'rgba(255,255,255,0.3)';
                    pCtx.beginPath(); pCtx.arc(segments[i].x - radius*0.3, segments[i].y - radius*0.3, radius*0.4, 0, Math.PI*2); pCtx.fill();
                }
            }
            requestAnimationFrame(animatePatternPreview);
        }

        const WORLD_SIZE = 4000;
        const SNAKE_SPEED = 3.5; 
        const MAX_BOTS = 40;     
        let lastRenderTime = performance.now();

        let myAngle = 0; let myBoost = false; let joystickManager = null;
        let peer = null, isHost = false, connections = [], serverConn = null, myId = null, myName = "";
        
        let gameState = { snakes: {}, food: [], leaderboard: [], particles: [], powerups: [], rankings: [] };
        let currentGameMode = 'classic';
        const POWERUP_TYPES = ['magnet', 'ghost', 'x2', 'shield'];
        const botNames = ["Alpha", "Gölge", "Yokedici", "Sinsi", "Kobra", "Titan", "Ninja", "Avcı", "Rüzgar", "Hızlı", "Zehir", "Gaddar", "Şampiyon", "Hayalet", "Fırtına", "Piton"];

        let inMenuMode = true; 
        let menuCamX = WORLD_SIZE / 2; let menuCamY = WORLD_SIZE / 2; let menuCamAngle = 0;

        function spawnSnake(id, name, isBot = false, skin = null, pattern = null, isMenuBot = false) {
            let startX, startY;
            let safeSpawn = false;
            let attempts = 0;
            
            while (!safeSpawn && attempts < 50) {
                startX = isMenuBot ? WORLD_SIZE/2 + (Math.random()-0.5)*1500 : Math.random() * (WORLD_SIZE - 400) + 200;
                startY = isMenuBot ? WORLD_SIZE/2 + (Math.random()-0.5)*1500 : Math.random() * (WORLD_SIZE - 400) + 200;
                
                safeSpawn = true;
                if (!isMenuBot && gameState && gameState.snakes) {
                    for (let otherId in gameState.snakes) {
                        let other = gameState.snakes[otherId];
                        let safeDistSq = (!other.isBot) ? 1000000 : 90000;
                        let dx = startX - other.x; let dy = startY - other.y;
                        if ((dx*dx + dy*dy) < safeDistSq) {
                            safeSpawn = false;
                            break;
                        }
                    }
                }
                attempts++;
            }

            let initialPowerups = { magnet: 0, ghost: 0, x2: 0, shield: 0 };
            if (!isBot && currentGameMode === 'overpowered') initialPowerups = { magnet: 10, ghost: 10, x2: 10, shield: 10 };

            gameState.snakes[id] = {
                id: id, name: name || "İsimsiz", x: startX, y: startY, angle: Math.random() * Math.PI * 2, 
                body: [], color: baseColors[Math.floor(Math.random() * (baseColors.length - 1))], size: 12, length: 15, isBot: isBot, 
                skin: skin, pattern: pattern, isBoosting: false, activePowerups: initialPowerups,
                combo: 0, comboTimer: 0, aiOffset: Math.floor(Math.random() * 15) 
            };
        }

        function spawnFood(x, y, size, color) {
            gameState.food.push({
                x: x || Math.random() * WORLD_SIZE, y: y || Math.random() * WORLD_SIZE,
                size: size || (Math.random() > 0.8 ? 8 : 4), color: color || baseColors[Math.floor(Math.random() * (baseColors.length - 1))]
            });
        }

        function spawnPowerup() {
            if (gameState.powerups.length < 25) { 
                gameState.powerups.push({
                    id: Math.random().toString(36).substr(2, 9), x: 100 + Math.random() * (WORLD_SIZE - 200), y: 100 + Math.random() * (WORLD_SIZE - 200),

                });

                if(s.y < 100) { s.y = 100; s.angle = Math.PI/2; } if(s.y > WORLD_SIZE-100) { s.y = WORLD_SIZE-100; s.angle = -Math.PI/2; }

        let lastKnownScore = 0;
        function checkMyDeath() {
            if (!isHost && myId && !gameState.snakes[myId]) {
                if (document.getElementById('death-screen').style.display !== 'flex') {
                    showDeathScreen(lastKnownScore);
                }
            } else if (myId && gameState.snakes[myId]) {
                lastKnownScore = Math.max(0, Math.floor((gameState.snakes[myId].length - 15) * 10));
            }
        }

        function killSnake(id, killerId) {
            let snake = gameState.snakes[id];
            if(!snake) return;

            if (!inMenuMode) { 
                if (id === myId || killerId === myId) playExplosionSound();
                else {
                    if (killerId && connections.find(c => c.peer === killerId)) {
                        let conn = connections.find(c => c.peer === killerId);
                        if (conn && conn.open) conn.send({ type: 'playSound' });
                    }
                    if (connections.find(c => c.peer === id)) {
                        let conn = connections.find(c => c.peer === id);
                        if (conn && conn.open) conn.send({ type: 'playSound' });
                    }
                }
            }

            if (killerId && gameState.snakes[killerId]) {
                let killer = gameState.snakes[killerId];
                killer.combo = (killer.combo || 0) + 1;
                killer.comboTimer = 5;
                if (killerId === myId) {
                    showComboText(killer.combo);
                } else {
                    let conn = connections.find(c => c.peer === killerId);
                    if (conn && conn.open) conn.send({ type: 'combo', count: killer.combo });
                }
            }

            snake.body.forEach((segment, index) => {
                if (index % 3 === 0) spawnFood(segment.x, segment.y, Math.min(snake.size * 1.2, 22), snake.color);
            });

            if(!gameState.particles) gameState.particles = [];
            gameState.particles.push({ type: 'text', text: snake.name + " Patladı!", x: snake.x, y: snake.y, vx: 0, vy: -2, life: 1.5, color: '#ff4757' });

            let particleCount = graphicsQuality === 'low' ? 5 : (graphicsQuality === 'medium' ? 15 : 30);
            for(let i=0; i<particleCount; i++) {
                let speed = Math.random() * 8 + 2; let ang = Math.random() * Math.PI * 2;
                gameState.particles.push({
                    type: 'dot', x: snake.x, y: snake.y, vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed,
                    life: 1.0 + Math.random(), color: (Math.random()>0.5 ? snake.color : '#ffffff'), size: Math.random() * 8 + 4
                });
            }

            delete gameState.snakes[id];

            if (id === myId) {
                showDeathScreen(Math.max(0, Math.floor((snake.length - 15) * 10)));
            }
            else if (snake.isBot && !inMenuMode) {
                setTimeout(() => {
                    let botId = "bot_" + Math.random().toString(36).substr(2, 5);
                    let botPattern = Math.random() > 0.3 ? patternKeys[Math.floor(Math.random() * patternKeys.length)] : null;
                    spawnSnake(botId, botNames[Math.floor(Math.random() * botNames.length)], true, null, botPattern, false);
                }, 2000);
            }
        }

        let globalTime = 0; 
        let frameCount = 0; 

        function hostGameLoop(currentTime) {
            if(inMenuMode) return;
            requestAnimationFrame(hostGameLoop);
            if (!currentTime) currentTime = performance.now();
            const deltaTime = currentTime - lastRenderTime;
            if (deltaTime < fpsInterval) return;
            lastRenderTime = currentTime - (deltaTime % fpsInterval);

            let dtSeconds = deltaTime / 1000;
            globalTime += dtSeconds;
            frameCount++;

            if (gameState.snakes[myId] && document.getElementById('death-screen').style.display !== 'flex') {
                gameState.snakes[myId].angle = myAngle;
                gameState.snakes[myId].isBoosting = myBoost; 
            }

            while(gameState.food.length < MAX_FOOD) spawnFood();
            if (gameState.powerups.length < 25 && Math.random() < 0.02) spawnPowerup();

            if(gameState.particles) {
                for (let i = gameState.particles.length - 1; i >= 0; i--) {
                    let p = gameState.particles[i]; 
                    p.x += p.vx; p.y += p.vy; p.life -= 0.02; 
                    if(p.type === 'dot') { p.vx *= 0.95; p.vy *= 0.95; p.size *= 0.95; }
                    if (p.life <= 0 || p.size < 0.5) gameState.particles.splice(i, 1);
                }
            }

            let allSnakes = Object.values(gameState.snakes);
            allSnakes.sort((a, b) => b.length - a.length);
            gameState.leaderboard = allSnakes.slice(0, 10).map(s => ({ name: s.name, score: Math.max(0, Math.floor((s.length - 15) * 10)) }));
            gameState.rankings = allSnakes.map(s => s.id);

            // BOT ZORLUK AYARLARI ÇEKİLİYOR
            let diffConfig = botDiffConfigs[currentBotDifficulty] || botDiffConfigs['normal'];

            for (let id in gameState.snakes) {
                let snake = gameState.snakes[id];
                
                for(let type in snake.activePowerups) {
                    if (snake.activePowerups[type] > 0) {
                        snake.activePowerups[type] -= dtSeconds;
                        if (snake.activePowerups[type] <= 0) snake.activePowerups[type] = 0;
                    }
                }

                if (snake.comboTimer > 0) {
                    snake.comboTimer -= dtSeconds;
                    if (snake.comboTimer <= 0) snake.combo = 0;
                }

                if (snake.activePowerups['magnet'] > 0) {
                    for(let f of gameState.food) {
                        let dx = snake.x - f.x; let dy = snake.y - f.y;
                        if ((dx*dx + dy*dy) < 90000) { 
                            let ang = Math.atan2(dy, dx); 
                            f.x += Math.cos(ang) * 10; f.y += Math.sin(ang) * 10;
                        }
                    }
                }

                for(let i = gameState.powerups.length - 1; i >= 0; i--) {
                    let p = gameState.powerups[i];
                    let dx = snake.x - p.x; let dy = snake.y - p.y;
                    let r = snake.size + p.size;
                    if ((dx*dx + dy*dy) < r*r) {
                        snake.activePowerups[p.type] = 10; gameState.powerups.splice(i, 1);
                    }
                }
                
                // ZORLUĞA GÖRE DİNAMİK BOT ZEKA DÖNGÜSÜ
                if (snake.isBot && ((frameCount + (snake.aiOffset || 0)) % diffConfig.frameCheck === 0)) {
                    let isDanger = false; let bestAngle = snake.angle;
                    
                    function checkDanger(angleOffset, distance) {
                        let px = snake.x + Math.cos(snake.angle + angleOffset) * distance;
                        let py = snake.y - Math.sin(snake.angle + angleOffset) * distance;
                        if (px < 50 || px > WORLD_SIZE - 50 || py < 50 || py > WORLD_SIZE - 50) return true;
                        
                        for (let otherId in gameState.snakes) {
                            if (otherId === id) continue;
                            let other = gameState.snakes[otherId];
                            if (other.activePowerups && other.activePowerups['ghost'] > 0) continue; 
                            
                            let dx = other.x - snake.x; let dy = other.y - snake.y;
                            if ((dx*dx + dy*dy) > diffConfig.viewDistSq) continue; 
                            
                            for (let i = 0; i < other.body.length; i += 3) {
                                let segment = other.body[i];
                                let sdx = px - segment.x; let sdy = py - segment.y;
                                let sr = snake.size + other.size + 20;
                                if ((sdx*sdx + sdy*sdy) < sr*sr) return true;
                            }
                        }
                        return false;
                    }

                    if (snake.activePowerups['ghost'] <= 0) {
                        let dangerStraight = checkDanger(0, 40) || checkDanger(0, 80); 
                        let dangerLeft = checkDanger(0.6, 60); let dangerRight = checkDanger(-0.6, 60);
                        if ((dangerStraight || dangerLeft || dangerRight) && Math.random() > 0.15) {
                            isDanger = true;
                            if (dangerRight || dangerStraight) bestAngle += 0.2; else if (dangerLeft || dangerStraight) bestAngle -= 0.2;
                        }
                    }

                    let closestEnemy = null; let enemyDistSq = diffConfig.viewDistSq; 
                    let bestFood = null; let foodScore = -1; let bestPu = null; let puScore = -1;

                    if (!isDanger) {
                        let targetX = null; let targetY = null;
                        
                        for (let p of gameState.powerups) {
                            let dx = p.x - snake.x; let dy = p.y - snake.y;
                            let distSq = dx*dx + dy*dy;
                            if (distSq < diffConfig.viewDistSq) { 
                                let score = 5000 / (Math.sqrt(distSq) + 1); 
                                if (score > puScore) { puScore = score; bestPu = p; } 
                            }
                        }

                        for (let otherId in gameState.snakes) {
                            if (otherId === id) continue;
                            let other = gameState.snakes[otherId];
                            if (other.activePowerups && other.activePowerups['ghost'] > 0) continue; 
                            let dx = other.x - snake.x; let dy = other.y - snake.y;
                            let distSq = dx*dx + dy*dy;
                            if (distSq < enemyDistSq) { enemyDistSq = distSq; closestEnemy = other; }
                        }

                        let foodChecks = Math.min(diffConfig.foodChecks, gameState.food.length);
                        for (let i=0; i<foodChecks; i++) {
                            let f = gameState.food[Math.floor(Math.random() * gameState.food.length)];
                            let dx = f.x - snake.x; let dy = f.y - snake.y;
                            let distSq = dx*dx + dy*dy;
                            if (distSq < diffConfig.viewDistSq * 1.5) { 
                                let score = (f.size * f.size * f.size) / (Math.sqrt(distSq) + 1);
                                if (score > foodScore) { foodScore = score; bestFood = f; }
                            }
                        }

                        // GÜNCELLENMİŞ ZOR MOD DÜŞMAN TAKİBİ
                        if (bestPu && puScore > foodScore) { targetX = bestPu.x; targetY = bestPu.y; }
                        else if (bestFood && bestFood.size > 10 && foodScore > 5) { targetX = bestFood.x; targetY = bestFood.y; } 
                        else if (closestEnemy && enemyDistSq < diffConfig.attackDistSq && (snake.activePowerups['ghost'] <= 0)) { 
                            targetX = closestEnemy.x + Math.cos(closestEnemy.angle) * 100; targetY = closestEnemy.y - Math.sin(closestEnemy.angle) * 100; 
                        } else if (bestFood) { targetX = bestFood.x; targetY = bestFood.y; }

                        if (targetX !== null && targetY !== null) {
                            let angleToTarget = Math.atan2(snake.y - targetY, targetX - snake.x);
                            let diff = angleToTarget - snake.angle;
                            while (diff > Math.PI) diff -= Math.PI * 2; while (diff < -Math.PI) diff += Math.PI * 2;
                            // ZOR MODDA ÇOK DAHA KESKİN DÖNÜŞ YAPAR
                            let turnSpeed = currentBotDifficulty === 'hard' ? 0.15 : 0.08;
                            bestAngle += diff * turnSpeed; 
                        } else { 
                            if (Math.random() < 0.1) bestAngle += (Math.random() - 0.5) * 0.5; 
                        }
                    }
                    snake.targetAngle = bestAngle;
                    if ((isDanger || (closestEnemy && enemyDistSq < diffConfig.attackDistSq)) && snake.length > 20) snake.isBoosting = (Math.random() < diffConfig.aggression); 
                    else snake.isBoosting = false;
                }

                if (snake.isBot && snake.targetAngle !== undefined) {
                     snake.angle = snake.targetAngle; 
                }

                snake.body.unshift({ x: snake.x, y: snake.y });
                if (snake.body.length > snake.length * 3) snake.body.pop();

                let currentSpeed = SNAKE_SPEED;
                if (snake.isBoosting && snake.length > 12) {
                    currentSpeed = SNAKE_SPEED * 2.2; snake.length -= 0.15; 
                    if(snake.size > 12) snake.size -= 0.03; 
                    if (Math.random() < 0.15) { let tail = snake.body[snake.body.length - 1]; if (tail) spawnFood(tail.x, tail.y, 4, snake.color); }
                }

                snake.x += Math.cos(snake.angle) * currentSpeed; snake.y -= Math.sin(snake.angle) * currentSpeed; 
                
                if (snake.x < 0 || snake.x > WORLD_SIZE || snake.y < 0 || snake.y > WORLD_SIZE) { 
                    if (snake.activePowerups['shield'] > 0) {
                        snake.activePowerups['shield'] = 0;
                        snake.angle += Math.PI; 
                        snake.x = Math.max(10, Math.min(WORLD_SIZE - 10, snake.x));
                        snake.y = Math.max(10, Math.min(WORLD_SIZE - 10, snake.y));
                        snake.activePowerups['ghost'] = 2;
                    } else {
                        killSnake(id, null); continue; 
                    }
                }

                let died = false; let killerId = null;
                if (snake.activePowerups['ghost'] <= 0) {
                    let tipX = snake.x + Math.cos(snake.angle) * (snake.size * 0.7);
                    let tipY = snake.y - Math.sin(snake.angle) * (snake.size * 0.7);

                    for (let otherId in gameState.snakes) {
                        if (id === otherId) continue;
                        let other = gameState.snakes[otherId];
                        if (other.activePowerups && other.activePowerups['ghost'] > 0) continue; 
                        for (let i = 0; i < other.body.length; i += 3) {
                            let segment = other.body[i];
                            let segmentRadius = other.size * (1 - (i / other.body.length) * 0.4);
                            
                            let dx = tipX - segment.x; let dy = tipY - segment.y;
                            let r = segmentRadius * 0.9;
                            if ((dx*dx + dy*dy) < r*r) { 
                                died = true; killerId = otherId; break; 
                            }
                        }
                        if(died) break;
                    }
                }
                
                if (died) { 
                    if (snake.activePowerups['shield'] > 0) {
                        snake.activePowerups['shield'] = 0;
                        snake.activePowerups['ghost'] = 2;
                        snake.x -= Math.cos(snake.angle) * snake.size * 5;
                        snake.y += Math.sin(snake.angle) * snake.size * 5;
                    } else {
                        killSnake(id, killerId); continue; 
                    }
                } 

                let multiplier = (snake.activePowerups['x2'] > 0) ? 2 : 1;
                for (let i = gameState.food.length - 1; i >= 0; i--) {
                    let f = gameState.food[i];
                    let dx = snake.x - f.x; let dy = snake.y - f.y;
                    let r = snake.size + f.size;
                    if ((dx*dx + dy*dy) < r*r) {
                        snake.length += (f.size > 10 ? 2 : 0.6) * multiplier; 
                        if(snake.size < 40) snake.size += (f.size > 10 ? 0.15 : 0.03) * multiplier; 
                        gameState.food.splice(i, 1); 
                    }
                }
            }

            const statePacket = { type: 'state', state: gameState };
            connections.forEach(conn => { if(conn.open) conn.send(statePacket); });
            
            let me = gameState.snakes[myId];
            drawGame(me ? me.x : WORLD_SIZE/2, me ? me.y : WORLD_SIZE/2, true);
        }

        // ====== EFSANE PETEK (HEXAGON) ÇİZİM ALANI ======
        function drawGame(targetX, targetY, showUI) {
            ctx.fillStyle = '#020612'; 
            ctx.fillRect(0, 0, width, height);

            let camX = Math.floor(targetX - width / 2); 
            let camY = Math.floor(targetY - height / 2);
            ctx.save(); ctx.translate(-camX, -camY);

            if (hexBackgroundPattern && graphicsQuality !== 'low') {
                ctx.fillStyle = hexBackgroundPattern;
                ctx.fillRect(camX, camY, width, height); 
            }

            ctx.strokeStyle = 'rgba(255, 71, 87, 0.2)'; ctx.lineWidth = 15; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
            ctx.strokeStyle = '#ff4757'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);

            gameState.food.forEach(f => {
                if(f.x > camX - 20 && f.x < camX + width + 20 && f.y > camY - 20 && f.y < camY + height + 20) {
                    let imgToDraw = foodCache[f.color] || foodCache['#ffffff'];
                    ctx.drawImage(imgToDraw, Math.floor(f.x - f.size), Math.floor(f.y - f.size), Math.floor(f.size*2), Math.floor(f.size*2));
                }
            });

            if (gameState.powerups) {
                gameState.powerups.forEach(p => {
                    if(p.x > camX - 30 && p.x < camX + width + 30 && p.y > camY - 30 && p.y < camY + height + 30) {
                        if(powerupCache[p.type]) {
                            let floatY = Math.sin(globalTime * 3) * 5; 
                            ctx.drawImage(powerupCache[p.type], Math.floor(p.x - p.size*1.5), Math.floor(p.y - p.size*1.5 + floatY));
                        }
                    }
                });
            }

            if(gameState.particles) {
                gameState.particles.forEach(p => {
                    if (p.x < camX - 50 || p.x > camX + width + 50 || p.y < camY - 50 || p.y > camY + height + 50) return;
                    
                    ctx.globalAlpha = Math.max(0, p.life);
                    if (p.type === 'text') {
                        ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.font = "bold 30px Arial"; ctx.textAlign = "center";
                        ctx.fillText(p.text, Math.floor(p.x + 2), Math.floor(p.y + 2));
                        ctx.fillStyle = p.color; ctx.fillText(p.text, Math.floor(p.x), Math.floor(p.y));
                    } else {
                        let imgToDraw = foodCache[p.color] || foodCache['#ffffff'];
                        ctx.drawImage(imgToDraw, Math.floor(p.x - p.size), Math.floor(p.y - p.size), Math.floor(p.size*2), Math.floor(p.size*2));
                    }
                    ctx.globalAlpha = 1.0;
                });
            }

            let snakeMargin = 200; 
            for (let id in gameState.snakes) {
                let snake = gameState.snakes[id];
                
                if (snake.x < camX - snakeMargin || snake.x > camX + width + snakeMargin ||
                    snake.y < camY - snakeMargin || snake.y > camY + height + snakeMargin) {
                    continue;
                }

                let currentP = (snake.pattern && bodyPatterns[snake.pattern]) ? bodyPatterns[snake.pattern] : null;

                if (snake.activePowerups && snake.activePowerups['ghost'] > 0) ctx.globalAlpha = 0.4;

                if (snake.isBoosting && snake.length > 12) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.lineWidth = 2;
                    for(let k=0; k<2; k++) {
                        ctx.beginPath();
                        let offset = (k === 0 ? -1 : 1) * (snake.size * 0.8);
                        let offsetX = Math.cos(snake.angle + Math.PI/2) * offset;
                        let offsetY = -Math.sin(snake.angle + Math.PI/2) * offset;
                        
                        let startX = snake.x + offsetX - Math.cos(snake.angle)* (snake.size * 1.5);
                        let startY = snake.y + offsetY + Math.sin(snake.angle)* (snake.size * 1.5);
                        let endX = startX - Math.cos(snake.angle) * (snake.size * 3);
                        let endY = startY + Math.sin(snake.angle) * (snake.size * 3);
                        
                        ctx.moveTo(Math.floor(startX), Math.floor(startY));
                        ctx.lineTo(Math.floor(endX), Math.floor(endY));
                        ctx.stroke();
                    }
                }

                for (let i = snake.body.length - 1; i >= 0; i -= 3) { 
                    let segment = snake.body[i]; 
                    let segColor = currentP ? currentP[Math.floor(i / 3) % currentP.length] : snake.color;
                    let radius = snake.size * (1 - (i / snake.body.length) * 0.4);
                    if (snake.isBoosting && i > 0) radius *= 0.8; 

                    let cachedSegment = segmentCache[segColor];
                    if(cachedSegment) {
                        let drawSize = radius * 2.5; 
                        ctx.drawImage(cachedSegment, Math.floor(segment.x - drawSize/2), Math.floor(segment.y - drawSize/2), Math.floor(drawSize), Math.floor(drawSize));
                    }
                }

                let isHeadDrawn = false;
                
                // KAFA BUGU İÇİN YENİ GÜVENLİ ÇİZİM MANTIĞI
                if (snake.skin) {
                    let img = skinImages[snake.skin];
                    // Resim yoksa, eksikse veya tam yüklenmediyse yeniden yüklemeyi dener.
                    if (!img || !img.complete || img.naturalWidth === 0) {
                        if (!img || img.error) {
                            img = new Image();
                            img.src = snake.skin + '.png';
                            img.error = false;
                            img.onerror = function() { this.error = true; };
                            skinImages[snake.skin] = img; 
                        }
                    } else {
                        // SADECE RESİM KUSURSUZ YÜKLENDİYSE ÇİZER (SİYAH YUVARLAK KALDIRILDI)
                        ctx.save(); ctx.translate(Math.floor(snake.x), Math.floor(snake.y)); ctx.rotate(Math.PI / 2 - snake.angle); 
                        let r = snake.size * 1.5; 
                        ctx.drawImage(img, Math.floor(-r), Math.floor(-r), Math.floor(r * 2), Math.floor(r * 2)); 
                        ctx.restore(); 
                        isHeadDrawn = true;
                    }
                }
                
                // RESİM YÜKLENEMEDİYSE VEYA HALA BEKLİYORSA OYUNUN KENDİ KAFASINI ÇİZER
                if (!isHeadDrawn) {
                    let headColor = currentP ? currentP[0] : snake.color;
                    ctx.fillStyle = headColor;
                    ctx.beginPath(); ctx.arc(Math.floor(snake.x), Math.floor(snake.y), snake.size, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = darkenColor(headColor, -20); ctx.lineWidth = snake.size * 0.15; ctx.stroke();
                    
                    if (graphicsQuality !== 'low') {
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.beginPath(); ctx.arc(Math.floor(snake.x - snake.size*0.3), Math.floor(snake.y - snake.size*0.3), snake.size*0.4, 0, Math.PI * 2); ctx.fill();
                    }

                    ctx.fillStyle = "white";
                    let ex = Math.cos(snake.angle + Math.PI/4) * (snake.size * 0.5); let ey = -Math.sin(snake.angle + Math.PI/4) * (snake.size * 0.5);
                    ctx.beginPath(); ctx.arc(Math.floor(snake.x + ex), Math.floor(snake.y + ey), snake.size * 0.35, 0, Math.PI * 2); ctx.fill();
                    let ex2 = Math.cos(snake.angle - Math.PI/4) * (snake.size * 0.5); let ey2 = -Math.sin(snake.angle - Math.PI/4) * (snake.size * 0.5);
                    ctx.beginPath(); ctx.arc(Math.floor(snake.x + ex2), Math.floor(snake.y + ey2), snake.size * 0.35, 0, Math.PI * 2); ctx.fill();
                    
                    ctx.fillStyle = "#111"; 
                    ctx.beginPath(); ctx.arc(Math.floor(snake.x + ex + Math.cos(snake.angle)*2), Math.floor(snake.y + ey - Math.sin(snake.angle)*2), snake.size * 0.18, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(Math.floor(snake.x + ex2 + Math.cos(snake.angle)*2), Math.floor(snake.y + ey2 - Math.sin(snake.angle)*2), snake.size * 0.18, 0, Math.PI * 2); ctx.fill();
                }

                if (snake.activePowerups && snake.activePowerups['shield'] > 0) {
                    ctx.strokeStyle = 'rgba(46, 204, 113, 0.6)';
                    ctx.lineWidth = Math.max(2, snake.size * 0.1);
                    ctx.beginPath();
                    ctx.arc(Math.floor(snake.x), Math.floor(snake.y), snake.size * 1.8 + Math.sin(globalTime*10)*2, 0, Math.PI*2);
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(46, 204, 113, 0.15)';
                    ctx.fill();
                }
                
                if (snake.activePowerups) {
                    let activeIcons = [];
                    if (snake.activePowerups['magnet'] > 0) activeIcons.push('🧲');
                    if (snake.activePowerups['ghost'] > 0) activeIcons.push('👻');
                    if (snake.activePowerups['x2'] > 0) activeIcons.push('⭐');
                    if (snake.activePowerups['shield'] > 0) activeIcons.push('🛡️');
                    
                    if (activeIcons.length > 0) {
                        ctx.font = "18px Arial"; ctx.textAlign = "center";
                        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillText(activeIcons.join(' '), Math.floor(snake.x + 1), Math.floor(snake.y - snake.size - 29));
                        ctx.fillStyle = "white"; ctx.fillText(activeIcons.join(' '), Math.floor(snake.x), Math.floor(snake.y - snake.size - 30));
                    }
                }

                ctx.globalAlpha = 1.0; 

                if(showUI && graphicsQuality !== 'low') {
                    ctx.font = "bold 15px 'Segoe UI', Arial"; ctx.textAlign = "center";
                    let displayName = id === myId ? "Sen (" + snake.name + ")" : snake.name;
                    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillText(displayName, Math.floor(snake.x + 1), Math.floor(snake.y - snake.size - 9)); 
                    ctx.fillStyle = "white"; ctx.fillText(displayName, Math.floor(snake.x), Math.floor(snake.y - snake.size - 10));
                }
            }
            ctx.restore();

            if (showUI) {
                let me = gameState.snakes[myId];
                if (me && me.activePowerups) {
                    ['magnet', 'ghost', 'x2', 'shield'].forEach(type => {
                        let el = document.getElementById('pu-' + type);
                        if(!el) return;
                        let timeSpan = el.querySelector('.pu-time');
                        let timeLeft = me.activePowerups[type];
                        if (timeLeft > 0) {
                            el.style.display = 'flex';
                            let ceilTime = Math.ceil(timeLeft);
                            timeSpan.innerText = ceilTime + 's';
                            if (ceilTime <= 3) timeSpan.classList.add('warning'); else timeSpan.classList.remove('warning');
                        } else el.style.display = 'none';
                    });
                }

                if (gameState.leaderboard && gameState.leaderboard.length > 0) {
                    let myRank = gameState.rankings ? gameState.rankings.indexOf(myId) + 1 : 0;
                    let lbCount = gameState.leaderboard.length;
                    
                    let boxHeight = 50 + (lbCount * 24);
                    if (myRank > 10) boxHeight += 50; 

                    let lbX = width - 200; let lbY = 20;
                    ctx.fillStyle = "rgba(10, 15, 25, 0.5)"; ctx.roundRect(lbX+3, lbY+3, 180, boxHeight, 15); ctx.fill(); 
                    ctx.fillStyle = "rgba(15, 23, 42, 0.85)"; ctx.roundRect(lbX, lbY, 180, boxHeight, 15); ctx.fill();

                    ctx.fillStyle = "#3498db"; ctx.font = "bold 18px 'Segoe UI', Arial"; ctx.textAlign = "center";
                    ctx.fillText("🏆 SIRALAMA", lbX + 90, lbY + 30);
                    ctx.textAlign = "left"; ctx.font = "bold 14px 'Segoe UI', Arial";
                    
                    gameState.leaderboard.forEach((player, index) => {
                        let yPos = lbY + 60 + (index * 24);
                        let color = index === 0 ? "#f1c40f" : (index === 1 ? "#bdc3c7" : (index === 2 ? "#e67e22" : "white"));
                        ctx.fillStyle = color;
                        let dName = player.name.length > 10 ? player.name.substring(0,8) + '..' : player.name;
                        ctx.fillText(`${index + 1}. ${dName}`, lbX + 15, yPos);
                        ctx.textAlign = "right"; ctx.fillText(player.score, lbX + 165, yPos); ctx.textAlign = "left";
                    });

                    if (myRank > 10) {
                        let yPos = lbY + 60 + (lbCount * 24);
                        ctx.fillStyle = "rgba(255, 255, 255, 0.3)"; ctx.textAlign = "center"; ctx.fillText("••••••••", lbX + 90, yPos - 5); 
                        ctx.fillStyle = "#2ecc71"; 
                        let myScore = gameState.snakes[myId] ? Math.max(0, Math.floor((gameState.snakes[myId].length - 15) * 10)) : 0;
                        ctx.textAlign = "left"; ctx.fillText(`${myRank}. Sen`, lbX + 15, yPos + 15);
                        ctx.textAlign = "right"; ctx.fillText(myScore, lbX + 165, yPos + 15);
                    }
                }
            }
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
                this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + r, y, r); this.closePath(); return this;
            }
        }
    </script>
</body>
